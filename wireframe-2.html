<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Wireframe 2 — App Menu into Carousel (lo-fi)</title>
<style>
  :root{
    --line:#9a9a9a;--box:#e4e4e4;--box2:#d6d6d6;--ink:#444;--ink-dim:#777;
    --bg:#f4f4f4;--frame:#bdbdbd;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;width:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    overflow:hidden;overscroll-behavior:none;position:fixed;}
  .ph{border:2px dashed var(--line);background:var(--box);border-radius:12px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--ink-dim);font-size:11px;letter-spacing:.04em;text-transform:uppercase;}
  .pill{position:fixed;left:50%;top:12px;transform:translateX(-50%);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);background:rgba(255,255,255,.7);padding:4px 12px;border-radius:12px;border:1px solid var(--frame);z-index:50;}

  .view{position:fixed;inset:0;transition:opacity .4s,transform .4s;}
  .view.hidden{opacity:0;pointer-events:none;transform:scale(.96);}

  /* ---- STATE A: app-grid menu ---- */
  #menu{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:60px 20px 90px;}
  .menu-top{width:44px;height:44px;border:2px dashed var(--line);border-radius:12px;margin-bottom:26px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--ink-dim);}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;width:100%;max-width:360px;}
  .tile{aspect-ratio:1/1;border:2px dashed var(--line);background:var(--box);border-radius:22px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px;color:var(--ink-dim);font-size:12px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:transform .15s;}
  .tile:active{transform:scale(.95);}
  .menu-chip{margin-top:26px;height:38px;width:230px;border-radius:20px;border:2px dashed var(--line);background:var(--box);display:flex;align-items:center;justify-content:center;color:var(--ink-dim);font-size:11px;letter-spacing:.05em;}

  /* ---- STATE B: carousel detail (vertical) ---- */
  #carousel{display:flex;align-items:center;justify-content:center;}
  .c-stage{position:relative;width:100%;height:100%;}
  .c-card{position:absolute;left:50%;top:50%;width:78vw;max-width:380px;height:62vh;
    transform:translate(-50%,-50%);background:#fff;border:2px solid var(--frame);border-radius:18px;
    box-shadow:0 12px 34px rgba(0,0,0,.14);padding:14px;display:flex;flex-direction:column;gap:10px;
    transition:transform .42s cubic-bezier(.4,0,.2,1),opacity .42s,filter .42s;opacity:0;}
  .c-card.active{opacity:1;transform:translate(-50%,-50%) scale(1);}
  .c-card.prev{opacity:.3;transform:translate(-50%,calc(-50% - 66vh)) scale(.85);filter:blur(1px);}
  .c-card.next{opacity:.3;transform:translate(-50%,calc(-50% + 66vh)) scale(.85);filter:blur(1px);}
  .c-card.hide{opacity:0;}
  .c-date{font-size:10px;color:var(--ink-dim);letter-spacing:.1em;}
  .c-img{flex:1;}
  /* side action buttons (expand / search) like the reference */
  .actions{position:fixed;right:12px;bottom:90px;display:flex;flex-direction:column;gap:14px;z-index:40;}
  .act{width:50px;height:50px;border-radius:16px;border:2px dashed var(--line);background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--ink-dim);text-align:center;line-height:1.1;cursor:pointer;}
  .back{position:fixed;left:14px;top:14px;z-index:50;height:34px;padding:0 14px;border-radius:18px;border:2px dashed var(--line);background:rgba(255,255,255,.85);color:var(--ink-dim);font-size:11px;letter-spacing:.05em;display:flex;align-items:center;cursor:pointer;}
  .c-hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);font-size:11px;color:var(--ink-dim);letter-spacing:.08em;z-index:40;}
</style>
</head>
<body>
  <div class="pill">Wireframe 2 · Menu into Carousel</div>

  <!-- STATE A -->
  <section class="view" id="menu">
    <div class="menu-top">Logo</div>
    <div class="grid" id="grid"></div>
    <div class="menu-chip">How are you feeling today? · Chat</div>
  </section>

  <!-- STATE B -->
  <section class="view hidden" id="carousel">
    <div class="back" id="back">‹ Menu</div>
    <div class="c-stage" id="cstage"></div>
    <div class="actions">
      <div class="act">Expand</div>
      <div class="act">Search</div>
    </div>
    <div class="c-hint">up swipe / down swipe</div>
  </section>

<script>
(function(){
  var TILES = ['Work','About','Shop','Journal','Events','Contact'];
  var grid = document.getElementById('grid');
  var menu = document.getElementById('menu');
  var carousel = document.getElementById('carousel');
  var cstage = document.getElementById('cstage');
  var back = document.getElementById('back');
  var idx = 0, N = 6;

  TILES.forEach(function(name,i){
    var t = document.createElement('div');
    t.className='tile'; t.textContent=name;
    t.addEventListener('click',function(){ openCarousel(i); });
    grid.appendChild(t);
  });

  // build carousel cards (one per tile)
  for(var i=0;i<N;i++){
    var c = document.createElement('section');
    c.className='c-card';
    c.innerHTML='<div class="c-date">'+TILES[i]+' · item</div>'+
      '<div class="ph c-img">Image / Content</div>'+
      '<div class="ph" style="height:14px"></div>';
    cstage.appendChild(c);
  }
  var cards = Array.prototype.slice.call(cstage.children);

  function renderC(){
    cards.forEach(function(c,i){
      c.classList.remove('active','prev','next','hide');
      if(i===idx) c.classList.add('active');
      else if(i===idx-1) c.classList.add('prev');
      else if(i===idx+1) c.classList.add('next');
      else c.classList.add('hide');
    });
  }
  function openCarousel(i){
    idx = i; renderC();
    menu.classList.add('hidden');
    carousel.classList.remove('hidden');
  }
  function closeCarousel(){
    carousel.classList.add('hidden');
    menu.classList.remove('hidden');
  }
  back.addEventListener('click', closeCarousel);

  function next(){ idx=Math.min(N-1,idx+1); renderC(); }
  function prev(){ idx=Math.max(0,idx-1); renderC(); }

  var startY=null;
  document.addEventListener('touchstart',function(e){ startY=e.touches[0].clientY; },{passive:true});
  document.addEventListener('touchend',function(e){
    if(startY===null||carousel.classList.contains('hidden')) {startY=null;return;}
    var dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dy)>50){ if(dy<0) next(); else prev(); }
    startY=null;
  },{passive:true});
  var wlock=false;
  document.addEventListener('wheel',function(e){
    if(carousel.classList.contains('hidden')) return;
    if(wlock) return; wlock=true; setTimeout(function(){wlock=false;},500);
    if(e.deltaY>0) next(); else prev();
  },{passive:true});
  document.addEventListener('keydown',function(e){
    if(carousel.classList.contains('hidden')) return;
    if(e.key==='ArrowDown') next();
    if(e.key==='ArrowUp') prev();
    if(e.key==='Escape') closeCarousel();
  });
})();
</script>
</body>
</html>
