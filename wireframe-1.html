<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Wireframe 1 — Vertical Swipe Carousel (lo-fi)</title>
<style>
  :root{
    --line:#9a9a9a;
    --box:#e4e4e4;
    --box2:#d6d6d6;
    --ink:#444;
    --ink-dim:#777;
    --bg:#f4f4f4;
    --frame:#bdbdbd;
    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    overflow:hidden;overscroll-behavior:none;
    position:fixed;width:100%;
  }
  .ph{border:2px dashed var(--line);background:var(--box);border-radius:12px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--ink-dim);font-size:12px;letter-spacing:.04em;text-transform:uppercase;}
  .stage{position:fixed;inset:0;overflow:hidden;}
  .card{
    position:absolute;left:50%;top:50%;
    width:88vw;max-width:430px;height:82vh;
    transform:translate(-50%,-50%);
    background:#fff;border:2px solid var(--frame);border-radius:var(--radius);
    box-shadow:0 10px 30px rgba(0,0,0,.12);
    padding:18px 16px;
    display:flex;flex-direction:column;gap:12px;
    transition:transform .42s cubic-bezier(.4,.0,.2,1),opacity .42s,filter .42s;
    opacity:0;pointer-events:none;
  }
  .card.active{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
  .card.prev{opacity:.32;transform:translate(-50%,calc(-50% - 84vh)) scale(.86);filter:blur(1px);}
  .card.next{opacity:.32;transform:translate(-50%,calc(-50% + 84vh)) scale(.86);filter:blur(1px);}
  .card.hide{opacity:0;}
  .card-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);}
  .hero{flex:0 0 38%;}
  .h-title{height:34px;}
  .row{display:flex;gap:10px;}
  .chip{flex:0 0 auto;height:28px;width:64px;border-radius:14px;}
  .lines{flex:1;display:flex;flex-direction:column;gap:8px;}
  .ln{height:12px;border-radius:6px;background:var(--box2);}
  .ln.s{width:60%;}
  .cta{height:44px;border-radius:22px;}
  .hotbar{
    position:fixed;right:10px;top:50%;transform:translateY(-50%);
    display:flex;flex-direction:column;gap:12px;
    background:rgba(255,255,255,.7);backdrop-filter:blur(6px);
    border:2px solid var(--frame);border-radius:26px;padding:10px 8px;z-index:20;
  }
  .hb{
    width:40px;height:40px;border-radius:12px;border:2px dashed var(--line);
    background:var(--box);display:flex;align-items:center;justify-content:center;
    font-size:9px;color:var(--ink-dim);text-align:center;line-height:1.1;cursor:pointer;
  }
  .hb.on{background:#bcbcbc;border-style:solid;border-color:#888;color:#222;}
  .hint{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);font-size:11px;color:var(--ink-dim);letter-spacing:.08em;z-index:20;}
  .pill{position:fixed;left:50%;top:12px;transform:translateX(-50%);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);background:rgba(255,255,255,.7);padding:4px 12px;border-radius:12px;border:1px solid var(--frame);z-index:20;}
</style>
</head>
<body>
  <div class="pill">Wireframe 1 · Vertical Swipe Carousel</div>
  <div class="stage" id="stage"></div>
  <nav class="hotbar" id="hotbar"></nav>
  <div class="hint" id="hint">up swipe / down swipe</div>
<script>
(function(){
  var SCREENS = ['Home','Work','About','Contact'];
  var stage = document.getElementById('stage');
  var hotbar = document.getElementById('hotbar');
  var idx = 0;
  SCREENS.forEach(function(name,i){
    var c = document.createElement('section');
    c.className = 'card';
    c.dataset.i = i;
    c.innerHTML =
      '<div class="card-label">'+name+'</div>'+
      '<div class="ph hero">Image / Visual</div>'+
      '<div class="ph h-title">Heading</div>'+
      '<div class="row"><div class="ph chip">Tab</div><div class="ph chip">Tab</div><div class="ph chip">Tab</div></div>'+
      '<div class="lines"><div class="ln"></div><div class="ln"></div><div class="ln s"></div></div>'+
      '<div class="ph cta">Primary CTA</div>';
    stage.appendChild(c);
  });
  SCREENS.forEach(function(name,i){
    var b = document.createElement('div');
    b.className='hb';
    b.textContent=name;
    b.addEventListener('click',function(){ go(i); });
    hotbar.appendChild(b);
  });
  var cards = Array.prototype.slice.call(stage.children);
  var hbs = Array.prototype.slice.call(hotbar.children);
  function render(){
    cards.forEach(function(c,i){
      c.classList.remove('active','prev','next','hide');
      if(i===idx) c.classList.add('active');
      else if(i===idx-1) c.classList.add('prev');
      else if(i===idx+1) c.classList.add('next');
      else c.classList.add('hide');
    });
    hbs.forEach(function(b,i){ b.classList.toggle('on', i===idx); });
  }
  function go(i){ idx = Math.max(0, Math.min(SCREENS.length-1, i)); render(); }
  function next(){ go(idx+1); }
  function prev(){ go(idx-1); }
  var startY=null;
  document.addEventListener('touchstart',function(e){ startY=e.touches[0].clientY; },{passive:true});
  document.addEventListener('touchend',function(e){
    if(startY===null) return;
    var dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dy)>50){ if(dy<0) next(); else prev(); }
    startY=null;
  },{passive:true});
  var wlock=false;
  document.addEventListener('wheel',function(e){
    if(wlock) return; wlock=true; setTimeout(function(){wlock=false;},500);
    if(e.deltaY>0) next(); else prev();
  },{passive:true});
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowDown') next();
    if(e.key==='ArrowUp') prev();
  });
  render();
})();
</script>
</body>
</html>
