<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Marina DiPonio — Menu / Carousel (hi-fi mockup)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a1f24;
    --glass:rgba(18,42,48,0.55);
    --glass-strong:rgba(20,48,55,0.72);
    --glass-edge:rgba(255,255,255,0.10);
    --ink:#eaf6f7;
    --ink-dim:#b9d2d4;
    --ink-quiet:#7fa2a5;
    --teal:#8fd4d6;
    --copper:#d18a5a;
    --copper-dim:#a86a44;
    --shadow:0 18px 60px rgba(0,0,0,0.45);
    --radius:22px;
    --radius-sm:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;width:100%;
    background:var(--bg-deep);
    color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    overflow:hidden;overscroll-behavior:none;position:fixed;
  }
  body::before{
    content:'';position:fixed;inset:0;z-index:-2;
    background:url('images/background.jpg') center/cover no-repeat;
    background-attachment:fixed;
  }
  body::after{
    content:'';position:fixed;inset:0;z-index:-1;
    background:linear-gradient(180deg, rgba(10,31,36,.55), rgba(10,31,36,.78));
  }
  .glass{
    background:var(--glass);
    backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border:1px solid var(--glass-edge);
    box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .eyebrow{font-size:11px;letter-spacing:.20em;text-transform:uppercase;color:var(--teal);}
  .fr{font-family:'Fraunces',serif;}

  /* ====== VIEW SWITCH ====== */
  .view{position:fixed;inset:0;transition:opacity .42s ease, transform .42s ease;}
  .view.hidden{opacity:0;pointer-events:none;transform:scale(.97);}

  /* ====== STATE A: MENU ====== */
  #menu{display:flex;flex-direction:column;align-items:center;padding:24px 20px 28px;overflow-y:auto;}
  .brand{display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:8px;}
  .brand .logo{width:140px;height:auto;object-fit:contain;margin-bottom:-22px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));}
  .brand .name{font-family:'Fraunces',serif;font-weight:500;font-size:26px;letter-spacing:.01em;}
  .brand .name em{font-style:italic;color:var(--copper);}
  .brand .role{font-size:11px;color:var(--ink-dim);letter-spacing:.04em;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;width:100%;max-width:360px;margin-top:22px;}
  .tile{
    position:relative;aspect-ratio:1/1;border-radius:24px;overflow:hidden;cursor:pointer;
    border:1px solid var(--glass-edge);box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
    transition:transform .18s ease, box-shadow .18s ease;
    background:var(--glass-strong);
  }
  .tile:active{transform:scale(.95);}
  .tile .thumb{position:absolute;inset:0;background-size:cover;background-position:center;filter:saturate(.92) brightness(.92);}
  .tile .veil{position:absolute;inset:0;background:linear-gradient(180deg, rgba(10,31,36,.05) 30%, rgba(10,31,36,.82));}
  .tile .cap{position:absolute;left:0;right:0;bottom:0;padding:12px 14px;}
  .tile .cap .t{font-family:'Fraunces',serif;font-weight:500;font-size:17px;line-height:1.1;}
  .tile .cap .s{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-top:3px;}
  .menu-chip{
    margin-top:22px;width:100%;max-width:330px;border-radius:24px;padding:13px 18px;
    display:flex;align-items:center;gap:10px;color:var(--ink-dim);font-size:13px;
  }
  .menu-chip .dot{width:26px;height:26px;border-radius:50%;background:var(--copper);flex:0 0 26px;display:flex;align-items:center;justify-content:center;color:#0a1f24;}
  .menu-chip .send{margin-left:auto;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--copper);}
  .search-wrap{margin-top:22px;width:100%;max-width:330px;position:relative;display:flex;flex-direction:column;align-items:center;}
  .search-wrap .menu-chip{margin-top:0;}
  #searchInput{flex:1;min-width:0;background:transparent;border:0;outline:0;color:var(--ink);font-family:"Inter",sans-serif;font-size:13px;}
  #searchInput::placeholder{color:var(--ink-dim);}
  .search-results{position:absolute;top:54px;left:0;right:0;border-radius:18px;padding:6px;max-height:300px;overflow-y:auto;z-index:30;display:flex;flex-direction:column;gap:2px;}
  .search-results.hidden{display:none;}
  .sr-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:12px;cursor:pointer;text-align:left;}
  .sr-item:hover{background:var(--glass-edge);}
  .sr-item .sr-t{font-family:"Inter",sans-serif;font-size:13px;color:var(--ink);line-height:1.2;}
  .sr-item .sr-s{font-size:11px;color:var(--ink-quiet);letter-spacing:.04em;text-transform:uppercase;}
  .sr-item .sr-tx{display:flex;flex-direction:column;gap:1px;}
  .sr-empty{padding:11px;color:var(--ink-quiet);font-size:12px;text-align:center;}
  .sr-answer{padding:11px 13px;border-radius:13px;background:rgba(209,138,90,.13);border:1px solid rgba(209,138,90,.30);margin-bottom:4px;cursor:pointer;}
  .sr-answer .sr-q{font-size:11px;color:var(--copper);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
  .sr-answer .sr-a{font-family:"Inter",sans-serif;font-size:13px;color:var(--ink);line-height:1.35;}
  .sr-answer .sr-go{font-size:11px;color:var(--teal);margin-top:5px;}

  /* ====== STATE B: CAROUSEL ====== */
  #carousel{}
  .c-stage{position:absolute;inset:64px 0 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-snap-type:y proximity;padding:calc(50vh - 130px) 0 calc(50vh - 130px);display:flex;flex-direction:column;align-items:center;gap:12px;}.c-stage::-webkit-scrollbar{display:none;}.c-card{position:relative;width:84vw;max-width:400px;flex:0 0 auto;height:64px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--glass-edge);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.08);background:var(--glass-strong);scroll-snap-align:center;transition:height .5s cubic-bezier(.4,0,.2,1),box-shadow .4s;cursor:pointer;}.c-card .c-bar{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 18px;font-family:'Fraunces',serif;font-weight:500;font-size:15px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);opacity:1;transition:opacity .35s;z-index:3;}.c-card.expanded{height:58vh;box-shadow:var(--shadow),0 0 0 1px var(--glass-edge),0 22px 50px rgba(0,0,0,.45);}.c-card.expanded .c-bar{opacity:0;pointer-events:none;}
  .c-hero{position:absolute;top:0;left:0;right:0;height:58vh;background-size:cover;background-position:center;opacity:0;transition:opacity .45s;}
  .c-card.expanded .c-hero{opacity:1;}
  .c-hero .badge{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--copper);background:rgba(10,31,36,.6);padding:5px 10px;border-radius:12px;backdrop-filter:blur(6px);}
  .c-hero .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,31,36,0) 40%,rgba(10,31,36,.9));}
  .c-meta{position:absolute;left:0;right:0;bottom:0;padding:0 20px 22px;z-index:2;opacity:0;transition:opacity .45s .05s;}
  .c-card.expanded .c-meta{opacity:1;}
  .c-meta .s{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);}
  .c-meta .t{font-family:'Fraunces',serif;font-weight:500;font-size:30px;line-height:1.04;margin:4px 0 6px;color:var(--ink);}
  .c-meta .d{font-size:13px;line-height:1.5;color:var(--ink-dim);}

  /* top bar in carousel */
  .c-top{position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:40;}
  .back{display:flex;align-items:center;gap:6px;height:38px;padding:0 16px;border-radius:20px;color:var(--ink);font-size:13px;cursor:pointer;}
  .c-title{font-family:Fraunces,serif;font-weight:500;font-size:22px;letter-spacing:.01em;color:var(--ink);text-transform:none;line-height:1;}
  /* side actions */
  .actions{position:fixed;right:14px;bottom:96px;display:flex;flex-direction:column;gap:14px;z-index:40;}
  .act{width:52px;height:52px;border-radius:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);transition:transform .15s;}
  .act:active{transform:scale(.92);}
  .act svg{width:22px;height:22px;stroke:var(--ink);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .c-hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);font-size:11px;color:var(--ink-quiet);letter-spacing:.08em;z-index:40;}
  /* ===== scrolling bento interiors (Home/About/Contact) ===== */
  .c-scroll{position:absolute;inset:64px 0 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:6px 18px 120px;}
  .c-scroll::-webkit-scrollbar{display:none;}
  .bento{max-width:420px;margin:0 auto;display:flex;flex-direction:column;gap:14px;}
  .b-card{background:var(--glass-strong);border:1px solid var(--glass-edge);border-radius:var(--radius);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.08);padding:18px;}
  .b-card.tight{padding:14px 16px;}
  .b-hero{padding:0;overflow:hidden;}
  .b-hero .b-img{width:100%;height:200px;background-size:cover;background-position:center;}
  .b-hero .b-body{padding:16px 18px 18px;}
  .b-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;}
  .b-title{font-family:Fraunces,serif;font-weight:500;font-size:24px;line-height:1.05;margin:0 0 6px;}
  .b-sub{font-size:13px;color:var(--ink-dim);line-height:1.5;margin:0;}
  .b-text{font-size:14px;color:var(--ink-dim);line-height:1.6;margin:6px 0 0;}
  .b-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-quiet);margin:0 0 10px;}
  .b-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-top:1px solid var(--glass-edge);text-decoration:none;color:var(--ink);}
  .b-row:first-of-type{border-top:0;}
  .b-row .b-k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-quiet);}
  .b-row .b-v{font-size:14px;color:var(--ink);}
  .b-row .b-arrow{color:var(--copper);font-size:16px;}
  .b-list-item{padding:12px 0;border-top:1px solid var(--glass-edge);}
  .b-list-item:first-child{border-top:0;}
  .b-list-item .li-k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:3px;}
  .b-list-item .li-t{font-size:15px;color:var(--ink);margin-bottom:2px;}
  .b-list-item .li-d{font-size:13px;color:var(--ink-dim);line-height:1.5;}
  .b-action{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:10px 18px;border-radius:22px;background:var(--copper);color:#0a1f24;font-size:14px;font-weight:600;text-decoration:none;}
  .b-quote{font-family:Fraunces,serif;font-style:italic;font-size:16px;line-height:1.5;color:var(--ink-dim);margin:0;}
  .b-block{margin-bottom:14px;}
  .b-block:last-child{margin-bottom:0;}
  .b-block-h{font-family:Fraunces,serif;font-weight:500;font-size:16px;color:var(--ink);margin-bottom:4px;}
  .b-group{padding:11px 0;border-top:1px solid var(--glass-edge);}
  .b-group:first-of-type{border-top:0;}
  .b-group-k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:4px;}
  .b-group-v{font-size:13px;color:var(--ink-dim);line-height:1.55;}
  .b-facts{list-style:none;margin:0;padding:0;}
  .b-facts li{position:relative;padding:7px 0 7px 18px;font-size:13px;color:var(--ink-dim);line-height:1.5;}
  .b-facts li::before{content:'\25C6';position:absolute;left:0;top:7px;color:var(--copper);font-size:10px;}

.b-acc{padding:0;}
.b-acc-sum{list-style:none;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px;}
.b-acc-sum::-webkit-details-marker{display:none;}
.b-acc-text{display:flex;flex-direction:column;gap:4px;}
.b-acc-h{font-family:Fraunces,serif;font-weight:500;font-size:18px;color:var(--ink);}
.b-acc-teaser{font-size:13px;color:var(--ink-dim);line-height:1.45;}
.b-acc-chev{flex:0 0 auto;width:22px;height:22px;border-radius:50%;border:1px solid var(--glass-edge);position:relative;margin-top:2px;transition:transform .2s ease;}
.b-acc-chev::before,.b-acc-chev::after{content:'';position:absolute;background:var(--teal);left:50%;top:50%;}
.b-acc-chev::before{width:9px;height:1.5px;transform:translate(-50%,-50%);}
.b-acc-chev::after{width:1.5px;height:9px;transform:translate(-50%,-50%);transition:opacity .2s ease;}
.b-acc[open] .b-acc-chev::after{opacity:0;}
.b-acc[open] .b-acc-chev{transform:rotate(180deg);}
.b-acc-body{padding:0 18px 16px;}
.b-more{margin-top:6px;border-top:1px solid var(--glass-edge);}
.b-more-sum{list-style:none;cursor:pointer;font-size:12px;letter-spacing:.06em;color:var(--teal);padding:12px 0 4px;}
.b-more-sum::-webkit-details-marker{display:none;}
.b-more-body{padding-top:2px;}

.b-acc-body .b-row{justify-content:flex-start;align-items:flex-start;}
.b-acc-body .b-row .b-k{flex:0 0 64px;width:64px;padding-top:2px;}
.b-acc-body .b-row .b-text{flex:1 1 auto;margin:0;}

   /* ===== PROJECT DETAIL VIEW ===== */
   .c-detail{position:absolute;inset:64px 0 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 0 120px;display:none;}
   .c-detail::-webkit-scrollbar{display:none;}
   .c-detail.on{display:block;}
   .cd-wrap{max-width:420px;margin:0 auto;padding:6px 18px 0;display:flex;flex-direction:column;gap:14px;}
   .cd-hero{position:relative;height:230px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--glass-edge);background-size:cover;background-position:center;}
   .cd-hero .cd-veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,31,36,0) 40%,rgba(10,31,36,.9));}
   .cd-hero .badge{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--copper);background:rgba(10,31,36,.6);padding:5px 10px;border-radius:12px;backdrop-filter:blur(6px);}
   .cd-head{position:relative;margin-top:-58px;padding:0 4px;}
   .cd-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;}
   .cd-title{font-family:'Fraunces',serif;font-weight:500;font-size:30px;line-height:1.04;margin:0 0 8px;color:var(--ink);}
   .cd-sub{font-size:13px;line-height:1.5;color:var(--ink-dim);margin:0;}
   .cd-award{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;line-height:1.45;color:var(--copper);margin:10px 0 0;}
   .cd-award .star{flex:0 0 auto;}
   .cd-links{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
   .cd-link{font-size:13px;color:var(--ink);background:var(--glass-strong);border:1px solid var(--glass-edge);border-radius:999px;padding:9px 16px;text-decoration:none;}
   .cd-link.primary{background:var(--copper-dim);border-color:transparent;color:#0a1f24;font-weight:600;}
   /* chapter switcher */
   .cd-chaprow{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 2px;scrollbar-width:none;}
   .cd-chaprow::-webkit-scrollbar{display:none;}
   .cd-chip{flex:0 0 auto;font-size:13px;color:var(--ink-dim);background:var(--glass);border:1px solid var(--glass-edge);border-radius:999px;padding:9px 15px;cursor:pointer;transition:background .2s,color .2s,border-color .2s;white-space:nowrap;}
   .cd-chip.on{background:var(--teal);color:#0a1f24;border-color:transparent;font-weight:600;}
   .cd-chapbody{background:var(--glass-strong);border:1px solid var(--glass-edge);border-radius:var(--radius);padding:18px;font-size:14px;line-height:1.62;color:var(--ink-dim);}
   .cd-chapbody h4{font-family:'Fraunces',serif;font-weight:500;font-size:16px;color:var(--ink);margin:14px 0 6px;}
   .cd-chapbody h4:first-child{margin-top:0;}
   .cd-chapbody p{margin:0 0 10px;}
   .cd-chapbody p:last-child{margin-bottom:0;}
   .cd-chapbody strong{color:var(--ink);font-weight:600;}
   /* meta panes */
   .cd-pane{background:var(--glass-strong);border:1px solid var(--glass-edge);border-radius:var(--radius);padding:16px 18px;}
   .cd-pane .cd-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-quiet);margin:0 0 12px;}
   .cd-stat{display:flex;gap:10px;align-items:flex-start;margin:0 0 9px;font-size:13.5px;line-height:1.45;}
   .cd-stat:last-child{margin-bottom:0;}
   .cd-stat .cd-k{flex:0 0 96px;color:var(--ink-quiet);}
   .cd-stat .cd-v{flex:1 1 auto;color:var(--ink);}
   .cd-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px;}
   .cd-tag{font-size:12px;color:var(--ink-dim);background:var(--glass);border:1px solid var(--glass-edge);border-radius:999px;padding:6px 12px;}
  
  </style>
</head>
<body>
  <!-- ===== STATE A : MENU ===== -->
  <section class="view" id="menu">
    <div class="brand">
      <img class="logo" src="LOGO_white.png" alt="Marina DiPonio logo" />
      <div class="name fr">Marina <em>DiPonio</em></div>
      <div class="role">Games User Researcher · Player Experience Designer</div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="search-wrap">
      <div class="menu-chip glass" id="searchChip">
        <span class="dot"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#0a1f24" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></span>
        <input id="searchInput" type="text" placeholder="Search projects, sections..." autocomplete="off" />
        <span class="send" id="searchClear" style="display:none;cursor:pointer">Clear</span>
      </div>
      <div class="search-results glass hidden" id="searchResults"></div>
    </div>
  </section>

  <!-- ===== STATE B : CAROUSEL ===== -->
  <section class="view hidden" id="carousel">
    <div class="c-top">
      <div class="back glass" id="back">‹ Menu</div>
      <div class="c-title" id="ctitle">Work</div>
      <div style="width:78px"></div>
    </div>
    <div class="c-stage" id="cstage"></div>
    <div class="actions">
      <div class="act glass" title="Expand"><svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></div>
      <div class="act glass" title="Search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></div>
    </div>
    <div class="c-hint">swipe up / down to browse</div>
    <div class="c-detail" id="cdetail" aria-hidden="true"></div>
  </section>

<script>
(function(){
  // ---- the four top-level destinations (the app tiles) ----
  var SECTIONS = [
    {key:'home',   name:'Home',    sub:'Start here',         thumb:'images/portrait.JPG'},
    {key:'work',   name:'Work',    sub:'Selected projects', thumb:'images/learntoleap-prototype.png'},
    {key:'about',  name:'About',   sub:'Who I am',          thumb:'images/portrait2.JPG'},
    {key:'contact',name:'Contact', sub:'Reach out',         thumb:'images/learntoleap-booth.jpg'}
  ];

  var DATA = {

  var PROJECTS = {};
  PROJECTS["learn-to-leap"] = {"id":"learn-to-leap","title":"Learn To Leap","subtitle":"Rethinking tutorial design through player choice · Senior Capstone · 2026","badge":"Featured","award":"Outstanding Achievement in Experience Design","img":"images/learntoleap-award.jpg","stats":[{"k":"Role","v":"Lead Researcher & Designer"},{"k":"Timeline","v":"Fall 2025 – Spring 2026"},{"k":"Participants","v":"11 (ages 18–26)"},{"k":"Venue","v":"Convergence 2026"}],"methods":["Mixed-Methods","Thematic Analysis","Semi-Structured Interviews","Behavioral Logging","Pre-Play Surveys"],"tools":["Unity 2D","Canva","Miro","Monday.com","Slipbox"],"links":[{"t":"Behance ↗","h":"https://www.behance.net/gallery/245484657/Learn-To-Leap"},{"t":"Play Prototype ↗","h":"https://marskies.itch.io/learn-to-leap-prototype"}],"chapters":[{"key":"ll-overview","label":"Overview","html":"<div><span>The Question</span><p>Many platformer games use static, one-size-fits-all tutorials that don’t account for differences in player experience. Learn To Leap asks whether gaming experience level correlates with a player’s preferred tutorial guidance — and, more practically, whether letting players choose their own guidance is a better design pattern than guessing for them.</p></div> <div><span>The Prototype</span><p>I built a custom Unity 2D platformer as the research instrument, focused on a single double-jump mechanic. Players could switch between three tutorial modes — Minimal, Guided, and Explicit — at any time, and the prototype logged every switch and time in state.</p></div>"},{"key":"ll-research","label":"Research","html":"<div><span>Method</span><p>Mixed-methods design, IRB exempt (UF Protocol ET00049273). Eleven participants aged 18–26 completed one session each over five days in March 2026, recruited via Discord and personal networks and distributed across four self-reported gaming-frequency bands.</p></div> <div><span>Session Flow</span><p>Each session ran ~20 minutes: a short pre-play survey, a 5–7 minute gameplay session with no instruction beyond “pick the mode that feels right,” and a 5–7 minute semi-structured interview. Quantitative gameplay data was paired with qualitative interview data analyzed via Braun and Clarke’s six-phase thematic analysis.</p></div>"},{"key":"ll-synthesis","label":"Synthesis","html":"<div><span>What the Data Said</span><p>Gaming frequency did not reliably predict tutorial preference. But eight themes surfaced across interviews, and two were unusually strong: all 11 participants affirmed that being able to select their own guidance level was a positive experience.</p></div> <div><span>The Gap</span><p>Stated preference diverged from behavioral usage — several participants who said they preferred Explicit actually spent the majority of their session in Minimal.</p></div>"},{"key":"ll-design","label":"Design","html":"<div><span>Choices as Artifact</span><p>The prototype was designed to be the artifact. Jump was intentionally mapped to “B” rather than space bar to neutralize prior muscle memory — a choice that surfaced in interviews as a design decision in its own right. Placeholder art was used throughout so visual polish wouldn’t introduce unintended differences between tutorial states.</p></div>"},{"key":"ll-outcome","label":"Outcome","html":"<div><span>Recognition</span><p>The project won “Outstanding Achievement in Experience Design” at Convergence 2026. The thesis now sits behind my senior capstone, alongside a full process gallery on Behance where you are invited to play it yourself!</p></div> <div><span>Takeaway</span><p>The broader takeaway: adaptive tutorial systems built only on performance data — or only on stated preference — miss part of the picture. The most reliable signal across 11 participants wasn’t which mode they picked; it was that being allowed to pick at all mattered to every one of them.</p></div>"}]};

    } else {
      carEls.forEach(function(el){ if(el) el.style.display='none'; });
      if(!bento){ bento = document.createElement('div'); bento.id='cbento'; bento.className='c-scroll'; carousel.appendChild(bento); }
      bento.style.display='block';
      bento.scrollTop = 0;
      bento.innerHTML = renderBento(key);
    }
    menu.classList.add('hidden');
    carousel.classList.remove('hidden');
  }
  function closeSection(){
    if(detailOpen){ closeDetail(); return; }
    carousel.classList.add('hidden');
    menu.classList.remove('hidden');
  }
  back.addEventListener('click', closeSection);

  function centerCardTo(i){
    if(i<0||i>=cards.length) return;
    var c=cards[i]; if(!c) return;
    var target=c.offsetTop-(cstage.clientHeight/2)+(c.offsetHeight/2);
    cstage.scrollTo({top:target,behavior:"smooth"});
  }
  function updateCentered(){
    if(!cards.length) return;
    var mid=cstage.scrollTop+cstage.clientHeight/2;
    var best=0,bestD=Infinity;
    cards.forEach(function(c,i){
      var cc=c.offsetTop+c.offsetHeight/2;
      var d=Math.abs(cc-mid);
      if(d<bestD){bestD=d;best=i;}
    });
    if(best!==idx){ idx=best; renderC(); }
  }
  function next(){ if(idx<cards.length-1){ centerCardTo(idx+1); } }
  function prev(){ if(idx>0){ centerCardTo(idx-1); } }
  var scrollT=null;
  cstage.addEventListener("scroll",function(){
    updateCentered();
    if(scrollT) clearTimeout(scrollT);
    scrollT=setTimeout(updateCentered,80);
  },{passive:true});
  document.addEventListener("keydown",function(e){
    if(carousel.classList.contains("hidden")) return;
    if(detailOpen) return;
    if(e.key==="ArrowDown"){ e.preventDefault(); next(); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); prev(); }
  });
  

  /* ---- functional search: filter + jump ---- */
  var sInput = document.getElementById("searchInput");
  var sResults = document.getElementById("searchResults");
  var sClear = document.getElementById("searchClear");
  function hideResults(){ sResults.classList.add("hidden"); sResults.innerHTML = ""; }
  var INDEX = [];
  SECTIONS.forEach(function(sec){
    INDEX.push({key:sec.key, idx:0, title:sec.name, sub:"Section · "+sec.sub});
    var items = (DATA[sec.key]||{}).items || [];
    items.forEach(function(it,i){
      INDEX.push({key:sec.key, idx:i, title:it.t, sub:DATA[sec.key].title+" · "+it.s});
    });
  });
  // ---- Q&A intents (answers drawn from real content) ----
  var QA = [
    {kw:["where","located","location","based","live","city","from"], q:"Where is Marina located?", a:"Based in Jacksonville, Florida \u2014 by way of Puerto Rico and Gainesville.", key:"about", idx:0},
    {kw:["contact","reach","get in touch","talk","hire","email","mail"], q:"How do I get in touch?", a:"Email marinadiponio@proton.me \u2014 best for project inquiries.", key:"contact", idx:0},
    {kw:["linkedin"], q:"LinkedIn?", a:"LinkedIn: /marinadiponio \u2014 roles, experience, and updates.", key:"contact", idx:1},
    {kw:["behance","portfolio","case study","case studies"], q:"Portfolio / case studies?", a:"Behance: /marinadiponio \u2014 visual case studies and design work.", key:"contact", idx:2},
    {kw:["meeting","call","schedule","book","chat","calendly","available","availability","meet"], q:"Can we set up a chat?", a:"Yes \u2014 grab a 30-min slot via Calendly.", key:"contact", idx:3},
    {kw:["school","education","degree","study","studied","college","university","major","uf","florida"], q:"Education?", a:"BA in Digital Arts & Sciences from the University of Florida, Summa Cum Laude.", key:"about", idx:0},
    {kw:["who","what does","do for","job","role","title","work as","profession"], q:"What does Marina do?", a:"Games user researcher & player-experience designer \u2014 six shipped games in two years.", key:"about", idx:1},
    {kw:["award","awards","honor","honors","recognition","accolades","achievement"], q:"Awards & recognition?", a:"Summa Cum Laude, President\u2019s & Dean\u2019s List, Best in Show, Most Innovative.", key:"about", idx:2}
  ];
  // ---- fuzzy matching helpers ----
  function lev(a,b){
    a=a||""; b=b||""; var m=a.length, n=b.length; if(!m) return n; if(!n) return m;
    var prev=[], cur=[], i, j;
    for(j=0;j<=n;j++) prev[j]=j;
    for(i=1;i<=m;i++){ cur[0]=i;
      for(j=1;j<=n;j++){ var cost=a.charAt(i-1)===b.charAt(j-1)?0:1; cur[j]=Math.min(prev[j]+1, cur[j-1]+1, prev[j-1]+cost); }
      for(j=0;j<=n;j++) prev[j]=cur[j];
    }
    return prev[n];
  }
  function fuzzy(q, text){
    q=q.toLowerCase(); text=(text||"").toLowerCase();
    if(!q) return 0;
    if(text.indexOf(q) > -1) return 1.0;
    var words = text.split(/[^a-z0-9]+/).filter(Boolean);
    var best = 0;
    words.forEach(function(w){
      if(w.indexOf(q) > -1 || q.indexOf(w) > -1){ best = Math.max(best, 0.9); return; }
      var dist = lev(q, w); var maxLen = Math.max(q.length, w.length);
      var sim = maxLen ? 1 - dist/maxLen : 0;
      if(sim > best) best = sim;
    });
    var dAll = lev(q, text); var simAll = text.length ? 1 - dAll/Math.max(q.length, text.length) : 0;
    return Math.max(best, simAll*0.6);
  }
  function jumpToAnswer(key, i){ jumpTo(key, i); }
  function runSearch(q){
    q = (q||"").trim();
    if(!q){ hideResults(); return; }
    var ql = q.toLowerCase();
    sResults.innerHTML = "";
    // 1) Q&A intent match
    var qaHit = null, qaBest = 0;
    QA.forEach(function(item){
      var score = 0;
      item.kw.forEach(function(k){ if(ql.indexOf(k) > -1) score += k.length >= 4 ? 2 : 1; });
      if(score > qaBest){ qaBest = score; qaHit = item; }
    });
    var isQuestion = /\?$/.test(q) || /^(where|what|who|how|when|can|does|is|do|tell)\b/.test(ql);
    if(qaHit && (qaBest >= 2 || (isQuestion && qaBest >= 1))){
      var ans = document.createElement("div"); ans.className = "sr-answer";
      ans.innerHTML = "<div class=\"sr-q\">"+qaHit.q+"</div><div class=\"sr-a\">"+qaHit.a+"</div><div class=\"sr-go\">Tap to open \u2192</div>";
      ans.addEventListener("click", function(){ jumpToAnswer(qaHit.key, qaHit.idx); });
      sResults.appendChild(ans);
    }
    // 2) fuzzy index matches
    var scored = INDEX.map(function(e){
      var s = Math.max(fuzzy(ql, e.title), fuzzy(ql, e.sub)*0.85);
      return {e:e, s:s};
    }).filter(function(x){ return x.s >= 0.5; })
     .sort(function(a,b){ return b.s - a.s; })
     .slice(0, 8);
    scored.forEach(function(x){
      var h = x.e;
      var row = document.createElement("div"); row.className = "sr-item";
      row.innerHTML = "<div class=\"sr-tx\"><span class=\"sr-s\">"+h.sub+"</span><span class=\"sr-t\">"+h.title+"</span></div>";
      row.addEventListener("click", function(){ jumpTo(h.key, h.idx); });
      sResults.appendChild(row);
    });
    if(!sResults.children.length){
      var em = document.createElement("div"); em.className = "sr-empty"; em.textContent = "No matches"; sResults.appendChild(em);
    }
    sResults.classList.remove("hidden");
  }
  if(sInput){
    sInput.addEventListener("input", function(){ sClear.style.display = sInput.value ? "block" : "none"; runSearch(sInput.value); });
    sInput.addEventListener("keydown", function(e){
      if(e.key === "Enter"){ var first = sResults.querySelector(".sr-item"); if(first) first.click(); }
      if(e.key === "Escape"){ hideResults(); sInput.value=""; sClear.style.display="none"; }
    });
    sClear.addEventListener("click", function(){ sInput.value=""; sClear.style.display="none"; hideResults(); sInput.focus(); });
    sInput.addEventListener("blur", function(){ setTimeout(function(){ if(!sInput.value){ hideResults(); sClear.style.display = "none"; } }, 150); });
    document.addEventListener("click", function(e){ if(!e.target.closest(".search-wrap")) hideResults(); });
  }
})();
</script>
