<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#0a1f24;
    --glass:rgba(18,42,48,0.55);
    --glass-strong:rgba(20,48,55,0.72);
    --glass-edge:rgba(255,255,255,0.10);
    --ink:#eaf6f7;
    --ink-dim:#b9d2d4;
    --ink-quiet:#7fa2a5;
    --teal:#8fd4d6;
    --copper:#d18a5a;
    --copper-dim:#a86a44;
    --shadow:0 18px 60px rgba(0,0,0,0.45);
    --radius:22px;
    --radius-sm:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;height:100%;width:100%;
    background:transparent;
    color:var(--ink);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    overflow:hidden;overscroll-behavior:none;position:fixed;
  }
  body::before{
    content:'';position:fixed;inset:0;z-index:-2;
    background:url('images/background.jpg') center/cover no-repeat;
    background-attachment:fixed;
  }
  body::after{
    content:'';position:fixed;inset:0;z-index:-1;
    background:linear-gradient(180deg, rgba(10,31,36,.55), rgba(10,31,36,.78));
  }
  .glass{
    background:var(--glass);
    backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border:1px solid var(--glass-edge);
    box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .eyebrow{font-size:11px;letter-spacing:.20em;text-transform:uppercase;color:var(--teal);}
  .fr{font-family:'Fraunces',serif;}

  /* ====== VIEW SWITCH ====== */
  .view{position:fixed;inset:0;transition:opacity .42s ease, transform .42s ease;}
  .view.hidden{opacity:0;pointer-events:none;transform:scale(.97);}

  /* ====== STATE A: MENU ====== */
  #menu{display:flex;flex-direction:column;align-items:center;padding:24px 20px 28px;overflow-y:auto;}
  .brand{display:flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:8px;}
  .brand .logo{width:140px;height:auto;object-fit:contain;margin-bottom:-22px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));}
  .brand .name{font-family:'Fraunces',serif;font-weight:500;font-size:26px;letter-spacing:.01em;}
  .brand .name em{font-style:italic;color:var(--copper);}
  .brand .role{font-size:11px;color:var(--ink-dim);letter-spacing:.04em;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;width:100%;max-width:360px;margin-top:22px;}
  .tile{
    position:relative;aspect-ratio:1/1;border-radius:24px;overflow:hidden;cursor:pointer;
    border:1px solid var(--glass-edge);box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
    transition:transform .18s ease, box-shadow .18s ease;
    background:var(--glass-strong);
  }
  .tile:active{transform:scale(.95);}
  .tile .thumb{position:absolute;inset:0;background-size:cover;background-position:center;filter:saturate(.92) brightness(.92);}
  .tile .veil{position:absolute;inset:0;background:linear-gradient(180deg, rgba(10,31,36,.05) 30%, rgba(10,31,36,.82));}
  .tile .cap{position:absolute;left:0;right:0;bottom:0;padding:12px 14px;}
  .tile .cap .t{font-family:'Fraunces',serif;font-weight:500;font-size:17px;line-height:1.1;}
  .tile .cap .s{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-top:3px;}
  .menu-chip{
    margin-top:22px;width:100%;max-width:330px;border-radius:24px;padding:13px 18px;
    display:flex;align-items:center;gap:10px;color:var(--ink-dim);font-size:13px;
  }
  .menu-chip .dot{width:26px;height:26px;border-radius:50%;background:var(--copper);flex:0 0 26px;display:flex;align-items:center;justify-content:center;color:#0a1f24;}
  .menu-chip .send{margin-left:auto;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--copper);}
  .search-wrap{margin-top:22px;width:100%;max-width:330px;position:relative;display:flex;flex-direction:column;align-items:center;}
  .search-wrap .menu-chip{margin-top:0;}
  #searchInput{flex:1;min-width:0;background:transparent;border:0;outline:0;color:var(--ink);font-family:"Inter",sans-serif;font-size:13px;}
  #searchInput::placeholder{color:var(--ink-dim);}
  .search-results{position:absolute;top:54px;left:0;right:0;border-radius:18px;padding:6px;max-height:300px;overflow-y:auto;z-index:30;display:flex;flex-direction:column;gap:2px;}
  .search-results.hidden{display:none;}
  .sr-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:12px;cursor:pointer;text-align:left;}
  .sr-item:hover{background:var(--glass-edge);}
  .sr-item .sr-t{font-family:"Inter",sans-serif;font-size:13px;color:var(--ink);line-height:1.2;}
  .sr-item .sr-s{font-size:11px;color:var(--ink-quiet);letter-spacing:.04em;text-transform:uppercase;}
  .sr-item .sr-tx{display:flex;flex-direction:column;gap:1px;}
  .sr-empty{padding:11px;color:var(--ink-quiet);font-size:12px;text-align:center;}
  .sr-answer{padding:11px 13px;border-radius:13px;background:rgba(209,138,90,.13);border:1px solid rgba(209,138,90,.30);margin-bottom:4px;cursor:pointer;}
  .sr-answer .sr-q{font-size:11px;color:var(--copper);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
  .sr-answer .sr-a{font-family:"Inter",sans-serif;font-size:13px;color:var(--ink);line-height:1.35;}
  .sr-answer .sr-go{font-size:11px;color:var(--teal);margin-top:5px;}

  /* ====== STATE B: CAROUSEL ====== */
  #carousel{}
  .c-stage{position:absolute;inset:64px 0 0;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding:calc(50vh - 430px) 0 calc(50vh - 130px);display:flex;flex-direction:column;align-items:center;gap:12px;}.c-stage::-webkit-scrollbar{display:none;}.c-card{position:relative;width:84vw;max-width:400px;flex:0 0 auto;height:64px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--glass-edge);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.08);background:var(--glass-strong);transition:height .5s cubic-bezier(.4,0,.2,1),box-shadow .4s;cursor:pointer;}.c-card .c-bar{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 18px;font-family:'Fraunces',serif;font-weight:500;font-size:15px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);opacity:1;transition:opacity .35s;z-index:3;}.c-card.expanded{height:46vh;scroll-margin-top:74px;box-shadow:var(--shadow),0 0 0 1px var(--glass-edge),0 22px 50px rgba(0,0,0,.45);}.c-card.expanded .c-bar{opacity:0;pointer-events:none;}
  .c-hero{position:absolute;top:0;left:0;right:0;height:46vh;background-size:cover;background-position:center;opacity:0;transition:opacity .45s;}
  .c-card.expanded .c-hero{opacity:1;}
  .c-hero .badge{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--copper);background:rgba(10,31,36,.6);padding:5px 10px;border-radius:12px;backdrop-filter:blur(6px);}
  .c-hero .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,31,36,0) 40%,rgba(10,31,36,.9));}
  .c-meta{position:absolute;left:0;right:0;bottom:0;padding:0 20px 22px;z-index:2;opacity:0;transition:opacity .45s .05s;}
  .c-card.expanded .c-meta{opacity:1;}
  .c-meta .s{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);}
  .c-meta .t{font-family:'Fraunces',serif;font-weight:500;font-size:30px;line-height:1.04;margin:4px 0 6px;color:var(--ink);}
  .c-meta .d{font-size:13px;line-height:1.5;color:var(--ink-dim);}

  /* top bar in carousel */
  .c-top{position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:40;}
  .back{display:flex;align-items:center;gap:6px;height:38px;padding:0 16px;border-radius:20px;color:var(--ink);font-size:13px;cursor:pointer;}
  .c-title{font-family:Fraunces,serif;font-weight:500;font-size:22px;letter-spacing:.01em;color:var(--ink);text-transform:none;line-height:1;}
  /* side actions */
  .actions{position:fixed;right:14px;bottom:96px;display:flex;flex-direction:column;gap:14px;z-index:40;}
  .act{width:52px;height:52px;border-radius:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink);transition:transform .15s;}
  .act:active{transform:scale(.92);}
  .act svg{width:22px;height:22px;stroke:var(--ink);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .c-hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);font-size:11px;color:var(--ink-quiet);letter-spacing:.08em;z-index:40;}
  /* ===== scrolling bento interiors (Home/About/Contact) ===== */
  .c-scroll{position:absolute;inset:64px 0 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:6px 18px 120px;}
  .c-scroll::-webkit-scrollbar{display:none;}
  .bento{max-width:420px;margin:0 auto;display:flex;flex-direction:column;gap:14px;}
  .b-card{background:var(--glass-strong);border:1px solid var(--glass-edge);border-radius:var(--radius);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,0.08);padding:18px;}
  /* HOME-NAV PATCH: tappable bento card */
  .b-card--tap{position:relative;cursor:pointer;padding-right:40px;transition:border-color .18s ease, transform .12s ease;}
  .b-card--tap:hover,.b-card--tap:focus-visible{border-color:var(--copper);outline:none;}
  .b-card--tap:active{transform:scale(0.992);}
  .b-card--tap .b-chev{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--copper);font-size:26px;line-height:1;font-family:Fraunces,serif;}
  .b-card.tight{padding:14px 16px;}
  .b-hero{padding:0;overflow:hidden;}
  .b-hero .b-img{width:100%;height:200px;background-size:cover;background-position:center;}
  .b-hero .b-body{padding:16px 18px 18px;}
  .b-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;}
  .b-title{font-family:Fraunces,serif;font-weight:500;font-size:24px;line-height:1.05;margin:0 0 6px;}
  .b-sub{font-size:13px;color:var(--ink-dim);line-height:1.5;margin:0;}
  .b-text{font-size:14px;color:var(--ink-dim);line-height:1.6;margin:6px 0 0;}
  .b-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-quiet);margin:0 0 10px;}
  .b-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-top:1px solid var(--glass-edge);text-decoration:none;color:var(--ink);}
  .b-row:first-of-type{border-top:0;}
  .b-row .b-k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-quiet);}
  .b-row .b-v{font-size:14px;color:var(--ink);}
  .b-row .b-arrow{color:var(--copper);font-size:16px;}
  .b-list-item{padding:12px 0;border-top:1px solid var(--glass-edge);}
  .b-list-item:first-child{border-top:0;}
  .b-list-item .li-k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:3px;}
  .b-list-item .li-t{font-size:15px;color:var(--ink);margin-bottom:2px;}
  .b-list-item .li-d{font-size:13px;color:var(--ink-dim);line-height:1.5;}
  .b-action{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:10px 18px;border-radius:22px;background:var(--copper);color:#0a1f24;font-size:14px;font-weight:600;text-decoration:none;}
  .b-quote{font-family:Fraunces,serif;font-style:italic;font-size:16px;line-height:1.5;color:var(--ink-dim);margin:0;}
  .b-block{margin-bottom:14px;}
  .b-block:last-child{margin-bottom:0;}
  .b-block-h{font-family:Fraunces,serif;font-weight:500;font-size:16px;color:var(--ink);margin-bottom:4px;}
  .b-group{padding:11px 0;border-top:1px solid var(--glass-edge);}
  .b-group:first-of-type{border-top:0;}
  .b-group-k{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:4px;}
  .b-group-v{font-size:13px;color:var(--ink-dim);line-height:1.55;}
  .b-facts{list-style:none;margin:0;padding:0;}
  .b-facts li{position:relative;padding:7px 0 7px 18px;font-size:13px;color:var(--ink-dim);line-height:1.5;}
  .b-facts li::before{content:'\25C6';position:absolute;left:0;top:7px;color:var(--copper);font-size:10px;}

.b-acc{padding:0;}
.b-acc-sum{list-style:none;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:16px 18px;}
.b-acc-sum::-webkit-details-marker{display:none;}
.b-acc-text{display:flex;flex-direction:column;gap:4px;}
.b-acc-h{font-family:Fraunces,serif;font-weight:500;font-size:18px;color:var(--ink);}
.b-acc-teaser{font-size:13px;color:var(--ink-dim);line-height:1.45;}
.b-acc-chev{flex:0 0 auto;width:22px;height:22px;border-radius:50%;border:1px solid var(--glass-edge);position:relative;margin-top:2px;transition:transform .2s ease;}
.b-acc-chev::before,.b-acc-chev::after{content:'';position:absolute;background:var(--teal);left:50%;top:50%;}
.b-acc-chev::before{width:9px;height:1.5px;transform:translate(-50%,-50%);}
.b-acc-chev::after{width:1.5px;height:9px;transform:translate(-50%,-50%);transition:opacity .2s ease;}
.b-acc[open] .b-acc-chev::after{opacity:0;}
.b-acc[open] .b-acc-chev{transform:rotate(180deg);}
.b-acc-body{padding:0 18px 16px;}
.b-more{margin-top:6px;border-top:1px solid var(--glass-edge);}
.b-more-sum{list-style:none;cursor:pointer;font-size:12px;letter-spacing:.06em;color:var(--teal);padding:12px 0 4px;}
.b-more-sum::-webkit-details-marker{display:none;}
.b-more-body{padding-top:2px;}

.b-acc-body .b-row{justify-content:flex-start;align-items:flex-start;}
.b-acc-body .b-row .b-k{flex:0 0 64px;width:64px;padding-top:2px;}
.b-acc-body .b-row .b-text{flex:1 1 auto;margin:0;}

   /* ===== PROJECT DETAIL VIEW ===== */
   .c-detail{position:absolute;inset:64px 0 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 0 120px;display:none;}
   .c-detail::-webkit-scrollbar{display:none;}
   .c-detail.on{display:block;}
   .cd-wrap{max-width:420px;margin:0 auto;padding:6px 18px 0;display:flex;flex-direction:column;gap:14px;}
   .cd-hero{position:relative;height:230px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--glass-edge);background-size:cover;background-position:center;}
   /* GALLERY (cd-gallery) */
   .cd-gallery{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid var(--glass-edge);}
   .cd-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
   .cd-track::-webkit-scrollbar{display:none;}
   .cd-slide{flex:0 0 100%;height:230px;background-size:cover;background-position:center;}
   .cd-arrow{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--glass-strong);border:1px solid var(--glass-edge);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;padding:0;z-index:2;}
   .cd-arrow svg{width:20px;height:20px;fill:none;stroke:var(--ink);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
   .cd-arrow:active{transform:translateY(-50%) scale(.9);}
   .cd-prev{left:10px;} .cd-next{right:10px;}
   .cd-dots{display:flex;gap:6px;justify-content:center;margin-top:10px;}
   .cd-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-quiet);opacity:.5;transition:opacity .2s,background .2s;}
   .cd-dot.on{background:var(--copper);opacity:1;}
   .cd-hero .cd-veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,31,36,0) 40%,rgba(10,31,36,.9));}
   .cd-hero .badge{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--copper);background:rgba(10,31,36,.6);padding:5px 10px;border-radius:12px;backdrop-filter:blur(6px);}
   .cd-head{position:relative;margin-top:14px;padding:0 4px;}
   .cd-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-bottom:6px;}
   .cd-title{font-family:'Fraunces',serif;font-weight:500;font-size:30px;line-height:1.04;margin:0 0 8px;color:var(--ink);}
   .cd-sub{font-size:13px;line-height:1.5;color:var(--ink-dim);margin:0;}
   .cd-award{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;line-height:1.45;color:var(--copper);margin:10px 0 0;}
   .cd-award .star{flex:0 0 auto;}
   .cd-links{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
   .cd-link{font-size:13px;color:var(--ink);background:var(--glass-strong);border:1px solid var(--glass-edge);border-radius:999px;padding:9px 16px;text-decoration:none;}
   .cd-link.primary{background:var(--copper-dim);border-color:transparent;color:#0a1f24;font-weight:600;}
   /* chapter switcher */
   .cd-chaprow{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 2px;scrollbar-width:none;}
   .cd-chaprow::-webkit-scrollbar{display:none;}
   .cd-chip{flex:0 0 auto;font-size:13px;color:var(--ink-dim);background:var(--glass);border:1px solid var(--glass-edge);border-radius:999px;padding:9px 15px;cursor:pointer;transition:background .2s,color .2s,border-color .2s;white-space:nowrap;}
   .cd-chip.on{background:var(--teal);color:#0a1f24;border-color:transparent;font-weight:600;}
   .cd-chapbody{background:var(--glass-strong);border:1px solid var(--glass-edge);border-radius:var(--radius);padding:18px;font-size:14px;line-height:1.62;color:var(--ink-dim);}
   .cd-chapbody h4{font-family:'Fraunces',serif;font-weight:500;font-size:16px;color:var(--ink);margin:14px 0 6px;}
   .cd-chapbody h4:first-child{margin-top:0;}
   .cd-chapbody p{margin:0 0 10px;}
   .cd-chapbody p:last-child{margin-bottom:0;}
   .cd-chapbody strong{color:var(--ink);font-weight:600;}.cd-chapbody>div>span{display:block;font-weight:700;color:var(--ink);margin:18px 0 8px;}.cd-chapbody>div:first-child>span{margin-top:0;}
   /* meta panes */
   .cd-pane{background:var(--glass-strong);border:1px solid var(--glass-edge);border-radius:var(--radius);padding:16px 18px;}
   .cd-pane .cd-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-quiet);margin:0 0 12px;}
   .cd-stat{display:flex;gap:10px;align-items:flex-start;margin:0 0 9px;font-size:13.5px;line-height:1.45;}
   .cd-stat:last-child{margin-bottom:0;}
   .cd-stat .cd-k{flex:0 0 96px;color:var(--ink-quiet);}
   .cd-stat .cd-v{flex:1 1 auto;color:var(--ink);}
   .cd-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px;}
   .cd-tag{font-size:12px;color:var(--ink-dim);background:var(--glass);border:1px solid var(--glass-edge);border-radius:999px;padding:6px 12px;}
  
    /* === SEARCH-OVERLAY PATCH === */
    /* BACK-FAB bottom-left round back button */
  #back{position:fixed;left:16px;bottom:18px;z-index:60;width:46px;height:46px;border-radius:50%;display:none;align-items:center;justify-content:center;background:var(--glass-strong);border:1px solid var(--glass-edge);box-shadow:var(--shadow);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer;padding:0;}
  #back svg{width:22px;height:22px;fill:none;stroke:var(--teal);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}

<script>
(function(){

  var SECTIONS = [

  // ---- carousel content per section ----
  var DATA = {
    work: {title:'Work', items:[{s:'Senior Project · UX Research', t:'Learn To Leap', d:'Capstone study on tutorial design and the value of player choice.', img:'images/learntoleap-award.jpg',detail:'learn-to-leap',pos:'70% center'},{s:'Project Management', t:'Cosmic Catch', d:'Most Innovative — a melodic fishing arcade game.', img:'images/cc-gameplay.png',detail:'cosmic-catch',pos:'left'},{s:'Project Management', t:'Tick Tock Trivia', d:'Best in Show — a fast-paced trivia party game.', img:'images/ttt-gameplay.png',detail:'tick-tock-trivia'},{s:'Project Management', t:'Yuumi-Chan: Rent is Due!', d:'On Steam — a chaotic rent-collecting romp.', img:'images/yuumi-gameplay.png',detail:'yuumi-chan'},{s:'Project Management · UI/UX',t:'Insane Wizard Goes Crazy Everywhere',d:'Chaotic action game built in 2 weeks.',img:'images/wizard-screenshot.png',detail:'insane-wizard'},{s:'Research', t:'ICE Accessibility Audit', d:'Accessibility heuristic audit and recommendations.', img:'images/ice-research.png',detail:'ice-accessibility'},{s:'UI/UX · Research',t:'UF Club Software',d:'University platform usability study.',img:'images/uf-platform.png',detail:'uf-club-software'},{s:'UI/UX', t:'StarTea', d:'Cozy tea-shop management concept.', img:'images/startea-hero.png',detail:'startea'},{s:'UI/UX',t:'Nutrition Tracking App',d:'AI-powered food logging, in development.',img:'images/nutrition-app.png',detail:'nutrition-app'},{s:'Project Management',t:'Social Media Campaign',d:'Strategic marketing at CYS.',img:'images/cys-instagram.png',detail:'social-media-cys'}]},
    about: {title:'About', items:[

      {s:'About Marina', t:'What I Make', d:'Six shipped games in two years as a games user researcher and player-experience designer.', img:'images/portrait2.JPG'},
      {s:'Recognition', t:'Honors', d:'Summa Cum Laude · President\'s & Dean\'s List · Best in Show · Most Innovative.', img:'images/learntoleap-award.jpg'}
    ]},
    contact: {title:'Contact', items:[
      {s:'Email', t:'marinadiponio@proton.me', d:'Best for project inquiries and detailed questions.', img:'images/background.jpg'},
      {s:'LinkedIn', t:'/marinadiponio', d:'Roles, experience, and professional updates.', img:'images/background.jpg'},
      {s:'Behance', t:'/marinadiponio', d:'Visual case studies and design work.', img:'images/background.jpg'},

  var grid = document.getElementById('grid');

      '<div class="thumb" style="background-image:url(\''+sec.thumb+'\')"></div>'+

  var cards = [];
  function renderC(){

      if(i===idx) c.classList.add("expanded"); else c.classList.remove("expanded");

  /* ===== PROJECT DETAIL DATA + RENDER ===== */
  var PROJECTS = {};
  PROJECTS["learn-to-leap"] = {"id":"learn-to-leap","title":"Learn To Leap","subtitle":"Rethinking tutorial design through player choice · Senior Capstone · 2026","badge":"","award":"Outstanding Achievement in Experience Design","img":"images/learntoleap-award.jpg","role":"Lead Researcher & Designer","gallery":["images/learntoleap-prototype.png","images/learntoleap-tutorials.png","images/learntoleap-framework.png","images/learntoleap-dataviz.png","images/learntoleap-data.png","images/learntoleap-booth.jpg","images/learntoleap-visitors.jpg","images/learntoleap-award.jpg"],"stats":[{"k":"Role","v":"Lead Researcher & Designer"},{"k":"Timeline","v":"Fall 2025 – Spring 2026"},{"k":"Participants","v":"11 (ages 18–26)"},{"k":"Venue","v":"Convergence 2026"}],"methods":["Mixed-Methods","Thematic Analysis","Semi-Structured Interviews","Behavioral Logging","Pre-Play Surveys"],"tools":["Unity 2D","Canva","Miro","Monday.com","Slipbox"],"links":[{"t":"Behance ↗","h":"https://www.behance.net/gallery/245484657/Learn-To-Leap"},{"t":"Play Prototype ↗","h":"https://marskies.itch.io/learn-to-leap-prototype"}],"chapters":[{"key":"ll-overview","label":"Overview","html":"<div><span>The Question</span><p>Many platformer games use static, one-size-fits-all tutorials that don’t account for differences in player experience. Learn To Leap asks whether gaming experience level correlates with a player’s preferred tutorial guidance — and, more practically, whether letting players choose their own guidance is a better design pattern than guessing for them.</p></div> <div><span>The Prototype</span><p>I built a custom Unity 2D platformer as the research instrument, focused on a single double-jump mechanic. Players could switch between three tutorial modes — Minimal, Guided, and Explicit — at any time, and the prototype logged every switch and time in state.</p></div>"},{"key":"ll-research","label":"Research","html":"<div><span>Method</span><p>Mixed-methods design, IRB exempt (UF Protocol ET00049273). Eleven participants aged 18–26 completed one session each over five days in March 2026, recruited via Discord and personal networks and distributed across four self-reported gaming-frequency bands.</p></div> <div><span>Session Flow</span><p>Each session ran ~20 minutes: a short pre-play survey, a 5–7 minute gameplay session with no instruction beyond “pick the mode that feels right,” and a 5–7 minute semi-structured interview. Quantitative gameplay data was paired with qualitative interview data analyzed via Braun and Clarke’s six-phase thematic analysis.</p></div>"},{"key":"ll-synthesis","label":"Synthesis","html":"<div><span>What the Data Said</span><p>Gaming frequency did not reliably predict tutorial preference. But eight themes surfaced across interviews, and two were unusually strong: all 11 participants affirmed that being able to select their own guidance level was a positive experience.</p></div> <div><span>The Gap</span><p>Stated preference diverged from behavioral usage — several participants who said they preferred Explicit actually spent the majority of their session in Minimal.</p></div>"},{"key":"ll-design","label":"Design","html":"<div><span>Choices as Artifact</span><p>The prototype was designed to be the artifact. Jump was intentionally mapped to “B” rather than space bar to neutralize prior muscle memory — a choice that surfaced in interviews as a design decision in its own right. Placeholder art was used throughout so visual polish wouldn’t introduce unintended differences between tutorial states.</p></div>"},{"key":"ll-outcome","label":"Outcome","html":"<div><span>Recognition</span><p>The project won “Outstanding Achievement in Experience Design” at Convergence 2026. The thesis now sits behind my senior capstone, alongside a full process gallery on Behance where you are invited to play it yourself!</p></div> <div><span>Takeaway</span><p>The broader takeaway: adaptive tutorial systems built only on performance data — or only on stated preference — miss part of the picture. The most reliable signal across 11 participants wasn’t which mode they picked; it was that being allowed to pick at all mattered to every one of them.</p></div>"}]};
  PROJECTS["cosmic-catch"] = {"id":"cosmic-catch","title":"Cosmic Catch","subtitle":"A cozy rhythm fishing adventure · 12-Hour Create-A-Thon · Product Lead & UI/UX","badge":"","award":"Most Innovative · Create-A-Thon","img":"images/cc-gameplay.png","role":"Product Lead · UI/UX","gallery":["images/cc-gameplay.png","images/cc-menu.png","images/cc-collect.png","images/cc-melody.png","images/cc-fish1.png","images/cc-fish2.png","images/cc-award.png"],"stats":[{"k":"Role","v":"Product Lead & UI/UX"},{"k":"Format","v":"12-Hour Create-A-Thon"},{"k":"Team","v":"5 Members"},{"k":"Recognition","v":"Most Innovative"}],"methods":["Scope Management","Concept Pitching","Art Direction","Milestone Tracking","Team Coordination"],"tools":["Unity","Procreate","Canva"],"links":[{"t":"Play Prototype ↗","h":"https://marskies.itch.io/cosmic-catch"},{"t":"Behance ↗","h":"https://www.behance.net/gallery/235381691/Cosmic-Catch-Post-Mortem"}],"chapters":[{"key":"cc-overview","label":"Overview","html":"<div><span>The Pitch</span><p>Cosmic Catch puts you in the role of a pop star mermaid, using your musical powers to catch celestial fish and add them to your collection. The concept merges the cozy satisfaction of fishing games with rhythm-based mechanics — timing your inputs to the beat to reel in your catch.</p></div> <div><span>The Win</span><p>Created during a 12-hour Create-A-Thon with the theme “Star,” our team of five developed a cohesive vision that earned the Most Innovative award. While programming challenges prevented a working prototype, the strength of our concept, art direction, and presentation demonstrated what a polished vision can achieve even without functional mechanics.</p></div>"},{"key":"cc-concept","label":"Concept","html":"<div><span>What We Delivered</span><p>Our deliverable was a comprehensive concept package rather than a playable prototype. We presented a complete vision of what Cosmic Catch could be: a meditative fishing experience where players learn the rhythms of different cosmic fish, building their collection while enjoying an ambient soundtrack.</p></div> <div><span>In The Package</span><p>The package included fully realized art assets — our mermaid protagonist, three unique fish designs with animation poses, the space moon pool environment, and a complete UI system. We also delivered three original fish-fight music tracks with percussion and vocals, plus ambient background music. The judges saw not just an idea, but a world ready to be built.</p></div>"},{"key":"cc-process","label":"Process","html":"<div><span>Scoping</span><p>Our initial brainstorm landed on a tight concept: rhythm-based fishing with a star theme. We scoped it small on purpose. But passion has a way of expanding scope — one teammate’s enthusiasm for adding a collection system was hard to resist, and suddenly we had two interconnected systems instead of one focused mechanic.</p></div> <div><span>The Pivot</span><p>With four hours left and programming hitting unfamiliar technical walls, I had to make a call. I assessed where we actually were versus where we hoped to be, and redirected the team’s energy. Instead of forcing a broken prototype, we would highlight everything that was done and present a polished concept — incredible art, cohesive direction, original music — rather than scrambling to ship buggy mechanics.</p></div> <div><span>Selling The Vision</span><p>That pivot meant packaging our vision in a way judges could understand and get excited about. The result was a presentation that showed not just what we made, but what Cosmic Catch could become — and that vision won Most Innovative.</p></div>"},{"key":"cc-outcome","label":"Outcome","html":"<div><span>Recognition</span><p>Cosmic Catch won the Most Innovative award at the Create-A-Thon — a recognition that a polished partial vision, presented with confidence, can outperform a buggy “complete” prototype.</p></div> <div><span>Know Your Team</span><p>Understanding your teammates’ actual capabilities before scoping is essential. We asked our programmer to tackle unfamiliar systems without fully understanding the learning curve. Going forward, I’d interview teammates about their comfort zones and experience levels before committing to technical scope.</p></div> <div><span>Build On A Foundation</span><p>Establish your bare minimum first — the smallest version that proves the concept works — then layer on features. We tried to build both the rhythm and collection systems simultaneously and ended up with neither. A working rhythm demo with placeholder art would have been stronger than beautiful art with no mechanics.</p></div> <div><span>Know When To Pivot</span><p>A polished partial vision can still win. Knowing when to pivot from “ship the prototype” to “sell the concept” is its own skill. Sometimes the best project-management decision is recognizing what you actually have and presenting it with confidence.</p></div>"}]};
  PROJECTS["tick-tock-trivia"] = {"id":"tick-tock-trivia","title":"Tick Tock Trivia","subtitle":"A fast-paced party trivia game · 3-Month Capstone · Producer & UX Lead","role":"Producer & UX Lead","badge":"","award":"Best in Show","img":"images/ttt-gameplay.png","gallery":["images/ttt-gameplay.png","images/ttt-menu.png","images/ttt-characters.png","images/ttt-design-system.png","images/ttt-wireframes.png","images/ttt-sprint.png","images/ttt-springo.png","images/ttt-team.png","images/ttt-award.png"],"stats":[{"k":"Role","v":"Producer & UX Lead"},{"k":"Timeline","v":"3 Months"},{"k":"Team","v":"6 Developers"},{"k":"Recognition","v":"Best in Show"}],"methods":["Cross-Functional Leadership","Bi-Weekly Playtesting","Accessibility Design","Component Library","User Feedback Loops"],"tools":["Unity","Figma","Canva","ChatGPT API"],"links":[{"t":"Play Prototype ↗","h":"https://marskies.itch.io/tick-tock-trivia"},{"t":"Behance ↗","h":"https://www.behance.net/gallery/221393629/Tick-Tock-Trivia"}],"chapters":[{"key":"ttt-overview","label":"Overview","html":"<div><span>The Game</span><p>Tick Tock Trivia is a fast-paced party game where every second counts. Players gather around, pick their avatars, and face off in a whirlwind of multiple-choice questions while our stopwatch host, Tick, keeps the questions coming. But don't get too comfy—Springo the Jack-in-the-Box timer is always winding up, ready to burst out and crank the pressure to eleven.</p></div> <div><span>The Recognition</span><p>The game was designed to be accessible, engaging, and endlessly replayable through our ChatGPT integration that generates custom trivia on any topic. This project earned Best in Show at our university showcase, recognizing its polish, innovation, and player experience design.</p></div>"},{"key":"ttt-final","label":"Final Piece","html":"<div><span>Gameplay</span><p>The final product features turn-based gameplay perfect for couch co-op or online hangouts. Players type in any topic and our ChatGPT integration whips up fresh questions in seconds—from Studio Ghibli films to 90s cartoons to obscure fishing lore.</p></div> <div><span>Aesthetic</span><p>Wrong answers chip away at players' hearts while Springo's suspenseful music speeds up the pulse. The scrapbook-style 2D cut-outs pop against a playful stage, complete with sticky note transitions and eye-catching avatars that give the game its unique personality.</p></div> <div><span>Accessibility</span><p>Accessibility was a first-class citizen in our design process. We implemented clear fonts, full mouse support, optional audio cues, and careful color contrast to ensure everyone could enjoy the experience.</p></div>"},{"key":"ttt-process","label":"Process","html":"<div><span>Research</span><p>Development began with extensive user research into party game mechanics and what makes trivia engaging for groups. We conducted playtesting sessions every two weeks, iterating on the pressure mechanics and question pacing based on player feedback.</p></div> <div><span>Visual Language</span><p>The scrapbook aesthetic emerged from our desire to create something warm and inviting—a stark contrast to sterile quiz show interfaces. We developed the visual language in Canva, creating component libraries for consistent UI elements across all screens.</p></div> <div><span>AI Integration</span><p>Integrating ChatGPT presented unique technical and design challenges. We needed to design loading states that felt seamless, handle API failures gracefully, and ensure generated questions maintained appropriate difficulty levels. Through iteration, we found the sweet spot that made custom topics feel magical rather than disruptive.</p></div>"},{"key":"ttt-outcome","label":"Outcome","html":"<div><span>Multi-Hat Leadership</span><p>This project taught me invaluable lessons about balancing creative vision with technical constraints. Managing a small team meant wearing multiple hats and learning to prioritize features that would deliver the most player value.</p></div> <div><span>Accessibility As Core</span><p>I deepened my understanding of accessibility in game design—not as an afterthought, but as a core design principle that makes experiences better for everyone. The positive feedback from players with different abilities validated this approach.</p></div> <div><span>Human-Centered Joy</span><p>Perhaps most importantly, I learned that player experience design is about creating moments of joy and connection. Watching groups of friends laugh and compete over custom trivia topics showed me the real impact of thoughtful, human-centered design.</p></div>"}]};
  PROJECTS["yuumi-chan"] = {"id":"yuumi-chan","title":"Yuumi-Chan: Rent is Due!","subtitle":"Magical girl life simulation · 25-Person Team · Producer","role":"Producer · UI/UX Designer","badge":"","award":"On Steam · YouTube Coverage","img":"images/yuumi-gameplay.png","gallery":["images/yuumi-gameplay.png","images/yuumi-team.png","images/yuumi-playtest.png","images/yuumi-presentation.png"],"stats":[{"k":"Role","v":"Producer"},{"k":"Timeline","v":"4 Months"},{"k":"Team","v":"25 Members · 8 Leads"},{"k":"Reception","v":"YouTube Coverage"}],"methods":["Producer Standups","Cross-Department Sync","Leadership Coaching","Scope Triage","Playtesting"],"tools":["Unity","Miro","Canva","Discord"],"links":[{"t":"Play Prototype ↗","h":"https://krillshot-games.itch.io/yuumi-chan-rent-is-due"},{"t":"Behance ↗","h":"https://www.behance.net/gallery/247783791/Yuumi-Chan-Rent-is-Due"}],"chapters":[{"key":"yc-overview","label":"Overview","html":"<div><span>The Game</span><p>Yuumi-Chan: Rent is Due! is a magical girl life simulation game where players balance the demands of saving the world with the very real pressure of making rent. As Producer, I led a 25-person team through four months of development, managing three departments and wearing whatever hat the team needed on any given day.</p></div> <div><span>The Role</span><p>The game launched on Itch.io in December 2025 and is now available on Steam. Within the first 10 days of the Itch.io release—with zero advertising—we achieved organic traction that validated our concept and execution.</p></div> <div><span>The Scale</span><p>The game caught the attention of content creators organically, including a YouTuber who played and uploaded the full game in Japanese—reaching an audience we never expected to connect with.</p></div>"},{"key":"yc-challenge","label":"The Challenge","html":"<div><span>Inexperienced Leadership</span><p>This was the largest team most of us had ever worked on, and that inexperience created real friction. Department leads were learning how to lead at the same time they were learning the project itself. Getting alignment across 25 people—many of whom had different visions for what the game should be—tested every communication skill I had.</p></div> <div><span>Communication Gaps</span><p>The core challenge wasn't technical; it was human. How do you get a team of new leaders to execute on decisions they didn't all agree with? How do you maintain momentum when the scope keeps shifting? I worked closely with our executive producer, Nick Heitzman, to navigate these dynamics, but much of it came down to showing up consistently, running structured standups, and being present in every department meeting.</p></div>"},{"key":"yc-process","label":"Process","html":"<div><span>Weekly Cadence</span><p>My workflow centered on weekly standups with all 8 leads, where we reviewed progress, flagged blockers, and aligned on priorities for the coming week. I participated in every department meeting—art, design, programming—not to micromanage, but to understand where I could help and to catch disconnects before they became crises.</p></div> <div><span>Servant Leadership</span><p>Playtesting drove our final polish decisions. We collected feedback from 11 testers and prioritized fixes based on player impact. One example: testers reported confusion about the $7,000 rent due at the end of the week. The information existed in the pause menu, but players weren't seeing it in time. We added explicit dialogue early in the game to set expectations—a small change that significantly improved the experience.</p></div>"},{"key":"yc-outcome","label":"Outcome","html":"<div><span>We Shipped</span><p>I tried to be everything this team needed—flexible, supportive, decisive when required. And we shipped. The game exists, people are playing it, YouTubers are covering it, and it's now on Steam. That's a win.</p></div> <div><span>Producer As Glue</span><p>I also learned a lesson that no amount of planning prepares you for: not every problem is a process problem. Some friction comes down to personalities, and you can do everything right—raise concerns early, communicate clearly, stay open—and still not be able to bring everyone into alignment. What I took away was knowing the difference: when to invest more effort in working something out, and when to accept that a dynamic is outside my control and focus my energy on protecting the rest of the team's momentum and morale.</p></div> <div><span>Lessons</span><p>The flip side: I now know what it takes to ship a game with a large team. I know how to run standups that actually move projects forward, how to translate playtest data into action items, and how to keep 25 people pointed in roughly the same direction. Next time, I'll be faster to protect the team from dysfunction—because protecting the team is part of the job.</p></div>"}]};
  PROJECTS["insane-wizard"] = {"id":"insane-wizard","title":"Insane Wizard Goes Crazy Everywhere","subtitle":"A chaotic first-person action game · 2-Week Sprint · Producer & UX","badge":"","award":"","img":"images/wizard-screenshot.png","role":"Producer & UX","gallery":["images/wizard-screenshot.png","images/wizard-ui.png","images/wizard-action.png","images/wizard-missile.png","images/wizard-v1.png","images/wizard-v2.png","images/wizard-team.png"],"stats":[{"k":"Role","v":"Producer & UX"},{"k":"Timeline","v":"2 Weeks"},{"k":"Team","v":"6 Members"},{"k":"Platform","v":"Itch.io"}],"methods":["Sprint Planning","Scope Management","Iterative Playtesting","Team Coordination","Concept Pitching"],"tools":["Unity","Canva","Itch.io"],"links":[],"chapters":[{"key":"iw-overview","label":"Overview","html":"<div><span>The Game</span><p>Insane Wizard Goes Crazy Everywhere is a first-person action game where players wield magical spells to survive waves of goblins and trolls in a cathedral dungeon. Built in just two weeks, the project challenged our team of six to deliver a polished, playable experience with tight scope management and rapid iteration.</p></div><div><span>The Scope</span><p>The game features spell-based combat with a unique dual-hand system—Magic Missile in the main hand for mana regeneration, and powerful spells like Fireball and Laser Beam in the off-hand. Our design pillars focused on fantasy elements, satisfying magic mechanics, and delivering the smallest viable demo that showcased each team member's skills.</p></div>"},{"key":"iw-final-piece","label":"Final Piece","html":"<div><span>What Shipped</span><p>The final product delivers five waves of increasingly challenging enemies in a stylized cathedral environment. Players face goblins as medium-tier threats and trolls as tanky heavy enemies, with wave composition escalating from simple goblin encounters to mixed hordes that test all available spells.</p></div><div><span>Combat & Feel</span><p>The UI system communicates critical game state through a health bar, mana meter, spell hotbar, and wave indicator. I designed the HUD to balance the game's chaotic energy with clear readability—players needed to track their resources at a glance while focused on fast-paced combat. The mana circle design went through several iterations based on team feedback to find the right visual weight.</p></div><div><span>Polish</span><p>Our cartoonish, darkly whimsical art direction drew inspiration from games like YAP YAP and Hades, creating a tone that was goofy and surreal while still delivering satisfying combat feedback. The low-poly cathedral environment with stained glass windows and torchlight gave the dungeon atmosphere without overscoping our artists.</p></div>"},{"key":"iw-process","label":"Process","html":"<div><span>Concept</span><p>Development kicked off with intensive brainstorming sessions where we defined our core concept: \"a wacky little wizard fights waves of goofy goblins and trolls.\" From there, I helped the team scope down from ambitious rogue-lite features to a focused demo that would showcase one room, two enemy types, and three spells.</p></div><div><span>Scoping</span><p>I created a comprehensive task list in Trello, breaking work into programming, modeling, UI, and audio tracks. Each teammate estimated their weekly capacity (ranging from 2-8 hours), and I aligned deliverables accordingly. Our meeting cadence—Sunday, Monday, and Friday sessions—kept everyone synchronized without burning out.</p></div><div><span>Iteration</span><p>For the UI/UX work, I started with competitive analysis of games like Rune Fjell and Terraria to understand spell hotbar conventions. The crosshair research focused on communicating accuracy and spell state clearly. I built HUD mockups in Canva, presented them to the team, and iterated based on developer feedback about implementation feasibility and player testing insights.</p></div>"},{"key":"iw-outcome","label":"Outcome","html":"<div><span>Scope Discipline</span><p>This project reinforced that appropriate scope is everything. Our team succeeded because everyone understood their capacity and committed to realistic deliverables. When challenges arose, teammates collaborated to solve problems rather than pushing through alone—a dynamic I worked hard to foster through transparent communication and flexible task reassignment.</p></div><div><span>Team Dynamics</span><p>I gained confidence in creating UI assets. Early in the project, I hesitated to commit to visual designs, but iterating through multiple HUD versions with team feedback showed me that rough concepts spark better discussions than waiting for perfect mockups. The collaborative workshopping process produced stronger results than I could have achieved designing in isolation.</p></div><div><span>Shipping Wins</span><p>Looking back, more emphasis on post-production and marketing would have added extra polish to our game. We delivered a solid playable experience, but dedicated time for trailer creation, itch.io page optimization, and social media presence could have given our work more visibility. It's a lesson I'll carry into future projects—budgeting time for the \"sparkle\" that helps games stand out.</p></div>"}]};
  PROJECTS["ice-accessibility"] = {"id":"ice-accessibility","title":"ICE Accessibility Audit","subtitle":"WCAG compliance & inclusive design · Customer Experience Internship · Summer 2024","badge":"","award":"","img":"images/ice-research.png","role":"UI/UX & User Research","gallery":["images/ice-research.png","images/ice-training.png","images/ice-findings.png","images/ice-bot-before.png","images/ice-bot-after.jpg"],"stats":[{"k":"Role","v":"UI/UX & User Research"},{"k":"Timeline","v":"Summer 2024"},{"k":"Team","v":"2 interns"},{"k":"Response Lift","v":"+333%"}],"methods":["WCAG 2.1 Audit","Semi-Structured Interviews","Screen Reader Testing","Survey Strategy","Stakeholder Handoff"],"tools":["JAWS","WCAG 2.1","Figma","Survey Design"],"links":[],"chapters":[{"key":"ice-accessibility-overview","label":"Overview","html":"<div><span>The Setup</span><p>ICE Mortgage Technology’s internal WCAG training videos were designed to teach employees about accessibility standards. There was just one problem: the training materials themselves weren’t fully accessible. As part of a two-person intern team, I helped audit these learning modules and gather firsthand feedback from employees who rely on assistive technologies.</p></div><div><span>The Opportunity</span><p>This proactive initiative gave us the opportunity to learn accessibility principles in motion — not just studying WCAG guidelines in theory, but applying them while interviewing real users about their daily experiences with the company’s digital tools.</p></div>"},{"key":"ice-accessibility-the-audit","label":"The Audit","html":"<div><span>Outreach</span><p>We began by reaching out to differently-abled employees across the company, conducting interviews to understand what assistive tools they used and where they encountered friction. Employees shared their experiences with JAWS screen readers, magnification software, contrast enhancers, and font scaling — giving us direct insight into how accessibility gaps affected their workflows.</p></div><div><span>Response Rate</span><p>Beyond interviews, I worked on boosting engagement with our accessibility survey. Previous surveys on the team had received around 3–5 responses. By researching email timing strategies, crafting more compelling subject lines, conducting personalized outreach, and sending strategic reminder emails, I increased the response rate to 10 — a 333% improvement that gave us richer data to work with.</p></div><div><span>Validation</span><p>I then validated interview findings by testing the training modules myself using screen readers, experiencing firsthand the barriers employees had described.</p></div>"},{"key":"ice-accessibility-findings","label":"Findings","html":"<div><span>Screen Readers</span><p>Screen reader compatibility emerged as the most significant issue. Content wasn’t structured in ways that made sense when read aloud, and critical information was often buried in menus or hidden behind interactions that screen readers couldn’t easily navigate.</p></div><div><span>Form Labels</span><p>Form labels were frequently inaccurate — a finding employees reported and I confirmed through testing. When a screen reader announces the wrong label, users have to guess what information a field requires, creating frustration and errors.</p></div><div><span>Tool Conflicts</span><p>One of the most nuanced findings: platforms that disabled users’ own accessibility tools while providing built-in alternatives. Even when the alternative was technically functional, it disrupted employees’ established workflows. Users had invested time configuring their preferred tools — forcing them to adapt to a different system, even temporarily, created unnecessary cognitive load.</p></div>"},{"key":"ice-accessibility-applied","label":"Applied","html":"<div><span>The Brief</span><p>During the same internship, I had the opportunity to apply what I’d learned to a separate project: redesigning the concept for an internal AI chatbot. My team was exploring how AI could benefit the company, and my role was creating a mockup that visualized the pitch alongside security research my teammates presented.</p></div><div><span>The Original</span><p>The original “HelpBot” interface had several issues I now recognized from my accessibility work: formulaic language that felt robotic, generic visual identity, and responses that instructed users to “try rephrasing with more details (4–10 words work best)” rather than actually helping.</p></div><div><span>The Redesign</span><p>My redesigned “ICE Assistant” addressed these issues: improved font contrast and sizing for readability, a personalized snowman icon that connected to the company brand, and conversational language that actually answered questions rather than deflecting. Instead of telling users their query was wrong, the assistant provided direct answers with actionable next steps.</p></div>"},{"key":"ice-accessibility-impact","label":"Impact","html":"<div><span>Handoff</span><p>We presented our findings to both stakeholders and the employees we’d interviewed. The interviewees approved our recommendations and — more importantly — felt heard. Our audit became a handoff document for future accessibility improvements, giving the team a clear roadmap of priorities.</p></div><div><span>What Shifted</span><p>This project fundamentally shaped how I approach design. I don’t just think about accessibility as a checklist anymore — I understand it as designing for real people with real workflows that shouldn’t be disrupted. That perspective carries into everything I do now: when designing surveys or research instruments, when building interfaces, when considering how someone might interact with my work using tools I’ve never personally needed.</p></div><div><span>Learned by Doing</span><p>The biggest takeaway isn’t just what I learned — it’s that I learned by doing. I took WCAG principles off the page and applied them through real user interviews, real testing, and real design iterations. That’s the kind of thorough, invested learning I bring to every project.</p></div>"}]};
  PROJECTS["uf-club-software"] = {"id":"uf-club-software","title":"UF Anthology Engage","subtitle":"Platform evaluation for UF student orgs · Gator User Design intern team","badge":"","award":"","img":"images/uf-platform.png","role":"UX Researcher","gallery":["images/uf-platform.png","images/uf-research.png","images/uf-findings.png","images/uf-recommendations.png"],"stats":[{"k":"Role","v":"UX Researcher"},{"k":"Timeline","v":"Summer 2025"},{"k":"Team","v":"GUD Intern Cohort"},{"k":"Scope","v":"11 Peer Institutions"}],"methods":["Competitive Analysis","Semi-Structured Interviews","Stakeholder Synthesis","Recommendation Framing","Cross-Institution Comparison"],"tools":["Figma","Google Suite"],"links":[],"chapters":[{"key":"uf-club-software-overview","label":"Overview","html":"<div><span>The Question</span><p>UF was evaluating whether to transition from Gator Connect to Anthology Engage for student organization management. As part of the Gator User Design intern team, I helped conduct research to inform this business decision—analyzing competitor platforms, interviewing students at peer institutions, and identifying what would actually make students engage with these tools.</p></div><div><span>My Role</span><p>The core question wasn't just \"which platform is better?\"—it was \"why aren't students using these platforms at all?\" Our research revealed that the problem wasn't unique to UF. Across universities, students overwhelmingly preferred Instagram and social media for discovering and engaging with clubs, regardless of what official platform their school offered.</p></div>"},{"key":"uf-club-software-research","label":"Research","html":"<div><span>Method</span><p>We used two complementary methods: competitive analysis and user interviews. For the competitive analysis, we examined Anthology Engage implementations at 11 peer institutions including FSU, UCF, UGA, UMich, and UNC. We documented core features, filtering systems, visual design choices, and unique integrations each school had implemented.</p></div><div><span>Peer Institutions</span><p>For user interviews, we conducted 30-45 minute semi-structured conversations with 11 students ranging from casual club members to student organization leaders. Participants represented different years, majors, and involvement levels—giving us a comprehensive view of how students actually discover, join, and engage with campus organizations.</p></div><div><span>User Interviews</span><p>The interviews focused on discovery patterns, platform usage, pain points, and desired features. We asked students to walk us through their actual process for finding clubs, not their idealized one.</p></div>"},{"key":"uf-club-software-findings","label":"Findings","html":"<div><span>The Core Problem</span><p>The fundamental problem: neither Gator Connect nor Anthology Engage gave clubs a compelling reason to stay active on the platform. The tools weren't personalizable enough for organization leaders to showcase their club's identity, and they weren't engaging enough for students browsing to feel like they were getting accurate, up-to-date information.</p></div><div><span>Directory vs Hub</span><p>Students told us they used official platforms for initial discovery, then immediately switched to Instagram, GroupMe, or Slack for real engagement. The platforms functioned as directories, not communities. Event information was frequently outdated. Club pages felt abandoned. Students had no way to tell if an organization was actually active.</p></div><div><span>What Officers Said</span><p>\"I would change the look of the website, it doesn't look appealing and the way the clubs are displayed doesn't make them look inviting at all.\" — Student from FSU, Marketing & Global Club Management</p></div>"},{"key":"uf-club-software-recommendations","label":"Recommendations","html":"<div><span>Bridge The Gap</span><p>Our recommendations focused on bridging the gap between \"directory\" and \"hub.\" First, require organizations to update their pages each semester to remain listed as active—this creates accountability and ensures students see current information. Second, improve filtering with research-backed categories including interest areas and engagement perks like free food or merch.</p></div><div><span>Make It Sticky</span><p>For event discovery, we recommended highlighting upcoming events on the homepage and allowing organizations to tag events with perks that draw students in. The platform should feel less overwhelming by using high-quality visuals that showcase authentic student life and implementing cleaner filter groupings without excessive scrolling.</p></div><div><span>Path Forward</span><p>We also suggested integrating existing UF resources—partnering with The Independent Florida Alligator for campus news and connecting with Gators for Good for service opportunities. The goal: position Engage as the central hub for student life, not just another website students have to check.</p></div>"}]};
  PROJECTS["startea"] = {"id":"startea","title":"StarTea","subtitle":"Wellness brand website · 30 Days · 5 Phases · UX Lead","badge":"","award":"","img":"images/startea-hero.png","role":"UX & Project Lead","gallery":["images/startea-hero.png","images/startea-personas.png","images/startea-design-system.png","images/startea-final.png","images/startea-timeline.png"],"stats":[{"k":"Role","v":"UX & Project Lead"},{"k":"Timeline","v":"30 Days · 5 Phases"},{"k":"Team","v":"3 Members"},{"k":"Output","v":"E-Commerce Prototype"}],"methods":["User Interviews","Design System","Parallel Workstreams","Phased Delivery","Usability Testing"],"tools":["Figma","User Testing","WCAG"],"links":[],"chapters":[{"key":"startea-overview","label":"Overview","html":"<div><span>The Brand</span><p>StarTea is a wellness brand focused on bringing the calming ritual of tea to stressed modern lives. Our team of three designed their complete website experience—from brand strategy through final prototype—in just 30 days.</p></div><div><span>The Scope</span><p>This project showcases the full UX lifecycle: research informing design, design requiring coordination, and project management keeping everything on track.</p></div>"},{"key":"startea-research","label":"Research","html":"<div><span>Discovery</span><p>We began with user interviews to understand how people discover and purchase wellness products online. Key insights revealed that trust signals and ingredient transparency were major concerns, while the ritual aspect of tea preparation was undervalued by competitors.</p></div><div><span>Trust Signals</span><p>I synthesized these findings into three actionable personas that guided all design decisions, ensuring every feature served a real user need.</p></div>"},{"key":"startea-design","label":"Design","html":"<div><span>Design System</span><p>The design system balanced warmth with professionalism—soft earth tones, generous whitespace, and a type hierarchy that guided users naturally through product information.</p></div><div><span>User Flow</span><p>Accessibility was built in from the start, not retrofitted. Every color combination was tested for WCAG AA compliance, and we conducted usability testing with 6 participants to validate our navigation and checkout flow.</p></div><div><span>Coordination</span><p>With three people and 30 days, efficient coordination was essential. I created a phased approach: Discovery, Define, Design, Test, and Deliver—with clear handoffs and parallel workstreams where possible.</p></div><div><span>Parallel Work</span><p>Weekly group reviews kept everyone aligned, while I tracked 50+ tasks to ensure nothing fell through the cracks. The structured approach let us hit every milestone with room for iteration.</p></div>"},{"key":"startea-outcome","label":"Outcome","html":"<div><span>The Prototype</span><p>The final prototype delivered a complete e-commerce experience: homepage, product browsing, detailed product pages, cart, and checkout—all tested and refined based on real user feedback.</p></div><div><span>Lessons</span><p>This project reinforced that great UX happens at the intersection of research, design, and management. Each discipline informed the others, creating a final product stronger than any single perspective could achieve.</p></div>"}]};
  PROJECTS["nutrition-app"] = {"id":"nutrition-app","title":"Nutrition Tracking App","subtitle":"AI-powered photo recognition · Solo MVP · UX & AI integration","badge":"","award":"","img":"images/nutrition-app.png","role":"Solo Build","gallery":["images/nutrition-app.png","images/nutrition-problem.png","images/nutrition-results.png","images/nutrition-future.png"],"stats":[{"k":"Role","v":"Solo Build"},{"k":"Status","v":"Functional MVP"},{"k":"Stack","v":"Lovable + n8n"},{"k":"Models","v":"OpenAI · Anthropic"}],"methods":["Problem Framing","MVP Scoping","LLM Prompt Design","Workflow Automation","User Flow Design"],"tools":["Lovable","n8n","OpenAI","Anthropic"],"links":[],"chapters":[{"key":"nutrition-app-overview","label":"Overview","html":"<div><span>Why This Exists</span><p>Tracking calories and macros is essential for many people—athletes optimizing performance, individuals managing health conditions, anyone trying to understand what they're actually eating. But manual food logging is tedious enough that most people abandon it within weeks. The friction isn't motivation; it's the process itself.</p></div><div><span>The Approach</span><p>I built a nutrition tracking app that uses AI photo recognition to extract macro nutritional data from images of food. Snap a photo, get your calories, protein, carbs, and fats. The goal was eliminating the manual entry barrier that kills most tracking habits before they form.</p></div>"},{"key":"nutrition-app-the-problem","label":"The Problem","html":"<div><span>Friction</span><p>Traditional nutrition apps require users to search databases, select portion sizes, and manually enter every item in every meal. For a single lunch, that might mean five separate entries with estimated weights and brand selections. Multiply that by three meals plus snacks, and you're spending significant time on data entry instead of actually eating.</p></div><div><span>Why People Quit</span><p>The people who need tracking most—those managing diabetes, recovering from eating disorders, or following strict dietary protocols—are often the same people for whom the cognitive load of manual logging creates the most friction. A simpler input method doesn't just save time; it makes consistent tracking actually sustainable.</p></div>"},{"key":"nutrition-app-the-solution","label":"The Solution","html":"<div><span>One Action</span><p>The app reduces food logging to a single action: take a photo. The AI analyzes the image, identifies the food items, estimates portions, and outputs calorie and macro data. Users get immediate feedback without searching databases or guessing serving sizes.</p></div><div><span>Under The Hood</span><p>I built the processing pipeline using n8n for automation, connecting the photo input to an LLM for image analysis and nutrition estimation. The interface was designed in Figma and built with Lovable, prioritizing speed and clarity over feature bloat.</p></div>"},{"key":"nutrition-app-next-steps","label":"Next Steps","html":"<div><span>Improving Accuracy</span><p>The MVP proves the concept works. The next milestone is improving accuracy, which requires upgrading the LLM's capacity and processing power. Better models mean more reliable food identification, more accurate portion estimation, and more precise macro calculations.</p></div><div><span>What MVP Proved</span><p>With additional funding, I'd also expand the feature set: meal history tracking, daily/weekly summaries, goal setting, and integration with fitness apps. But the core insight remains the same—reduce friction to the absolute minimum, and people will actually track. Everything else is iteration on that foundation.</p></div>"}]};
  PROJECTS["social-media-cys"] = {"id":"social-media-cys","title":"Social Media Campaign","subtitle":"The Courtyards at UF · 6-Month Engagement · Content & CRM","badge":"","award":"","img":"images/cys-instagram.png","role":"Social Media & CRM","gallery":["images/cys-instagram.png","images/cys-content.png","images/cys-posts.png","images/cys-analytics.png"],"stats":[{"k":"Role","v":"Social Media & CRM"},{"k":"Timeline","v":"6 Months"},{"k":"Company","v":"Contemporary Management Concepts"},{"k":"Reach","v":"6,332 Monthly Views"}],"methods":["Audience Research","Posting Cadence","CRM Triage","Content Calendaring","Analytics Review"],"tools":["CRM","Canva","Buffer"],"links":[],"chapters":[{"key":"social-media-cys-overview","label":"Overview","html":"<div><span>The Property</span><p>The Courtyards is a student-focused apartment complex half a block from UF's campus, managed by Contemporary Management Concepts. My role combined social media marketing with hands-on CRM management—creating content that drove engagement while personally tracking and nurturing leads through the leasing pipeline.</p></div><div><span>My Role</span><p>The challenge was reaching students where they actually spend time (social media) while maintaining the personal touch that converts interest into signed leases. I developed a strategy that balanced resident life content—building community and FOMO—with practical deadline reminders and activity announcements.</p></div>"},{"key":"social-media-cys-strategy","label":"Strategy","html":"<div><span>Timing As Research</span><p>I approached posting time optimization like a research project. Generic \"best times to post\" advice wasn't cutting it, so I dug deeper—researching optimal timing by region, time zone, and demographic. The more specific the data, the better the results. I tested different combinations and tracked what actually moved the needle for our specific audience of UF-adjacent students.</p></div><div><span>Content System</span><p>Content fell into two buckets: resident life (community events, apartment features, lifestyle content) and informational (deadline reminders, leasing updates, activity announcements). The resident life content built aspiration—showing prospective tenants what living at The Courtyards actually looked like. The informational content drove action at key decision points in the leasing cycle.</p></div>"},{"key":"social-media-cys-execution","label":"Execution","html":"<div><span>CRM Triage</span><p>Beyond social media, I managed the CRM side of the operation. Each day I worked, I reviewed incoming messages and cross-referenced them with notes from property tours. This wasn't automated follow-up—it was personal outreach informed by actual conversations.</p></div><div><span>Cross-Channel Flow</span><p>I contacted leads through the right channel at the right time: emails for detailed information, texts for quick reminders, calls for prospects who needed that extra push. The key was treating each lead as a person with specific concerns, not just a name in a database. Tour notes gave me context—what they were excited about, what hesitations they had—so my follow-ups could address real questions rather than sending generic marketing copy.</p></div>"},{"key":"social-media-cys-results","label":"Results","html":"<div><span>The Numbers</span><p>The numbers validated the strategy: 6,332 views in a single month and over 60% follower interaction rate. But the real win was in the process—building a repeatable system that connected social media engagement to actual leasing outcomes.</p></div><div><span>The System</span><p>This role taught me that marketing and user research share the same core skill: understanding what people actually care about and meeting them there. The posting time research was fundamentally user research. The personalized CRM follow-ups were empathy in action. The content strategy was hypothesis testing. These aren't separate disciplines—they're all about paying attention to what works and doing more of it.</p></div>"}]};

  function wireGallery(p){
    var track=document.getElementById('cdTrack'); if(!track) return;
    var slides=track.children; var prev=document.getElementById('cdPrev'); var next=document.getElementById('cdNext');
    var dots=document.getElementById('cdDots');
    function cur(){ return Math.round(track.scrollLeft / track.clientWidth); }
    function go(i){ i=Math.max(0,Math.min(slides.length-1,i)); track.scrollTo({left:i*track.clientWidth,behavior:'smooth'}); }
    if(prev) prev.addEventListener('click',function(){ go(cur()-1); });
    if(next) next.addEventListener('click',function(){ go(cur()+1); });
    function sync(){ if(!dots) return; var c=cur(); Array.prototype.forEach.call(dots.children,function(d,i){ d.classList.toggle('on',i===c); }); }
    track.addEventListener('scroll',function(){ window.requestAnimationFrame(sync); });
  }

      btn.classList.add("on");
      body.innerHTML = chap.html; body.scrollIntoView({block:"nearest"});
    });
  }
